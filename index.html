<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MEUTE">
<meta name="theme-color" content="#131210">
<title>MEUTE — Chasseurs de monstres</title>
<style>
/* ============================================================
   MEUTE — direction minimaliste "fer & braise"
   Charbon chaud, texte os, un seul accent braise.
   Chiffres en mono. Couleur réservée à la rareté & au danger.
   ============================================================ */
:root{
  --bg:#131210; --bg2:#1a1714; --bg3:#221d18;
  --line:rgba(232,221,201,.10); --line2:rgba(232,221,201,.20);
  --ink:#e8ddc8; --dim:#a59c89; --faint:#6f685b;
  --ember:#e0913f; --ember-soft:rgba(224,145,63,.14);
  --blood:#d0594d; --blood-soft:rgba(208,89,77,.16);
  --heal:#74ad6f;
  --steel:#6f9bc4; --amethyst:#a982cf; --gold:#d9b25b;
  --steel-soft:rgba(111,155,196,.16); --amethyst-soft:rgba(169,130,207,.16); --gold-soft:rgba(217,178,91,.16); --heal-soft:rgba(116,173,111,.16);
  --accent:#e0913f; --accent-soft:rgba(224,145,63,.14);
  --sans:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:radial-gradient(135% 90% at 50% 0%, rgba(224,145,63,.05), transparent 55%) fixed, var(--bg);
  color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;}
.wrap{max-width:640px;margin:0 auto;padding:max(env(safe-area-inset-top),18px) max(env(safe-area-inset-right),16px) max(env(safe-area-inset-bottom),48px) max(env(safe-area-inset-left),16px);}
.num{font-family:var(--mono);}

/* --- emblème griffe --- */
.claw{display:inline-block;vertical-align:-.16em;}
.mark-big{display:flex;justify-content:center;margin-bottom:6px;}
.mark-big .claw{width:46px;height:46px;color:var(--ember);}

/* --- barre supérieure --- */
.top{display:flex;align-items:center;gap:9px;padding-bottom:12px;margin-bottom:14px;border-bottom:1px solid var(--line);}
.top .mk .claw{width:18px;height:18px;color:var(--ember);}
.top .brand{font-weight:700;letter-spacing:.22em;font-size:13px;}
.top .wave{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--dim);}
.top .wave i{color:var(--faint);font-style:normal;}

/* --- libellés de section --- */
.sect-label{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin:14px 0 7px;}
h1{font-size:30px;letter-spacing:.16em;text-align:center;margin:2px 0 6px;font-weight:700;}
h2{font-size:17px;font-weight:600;margin:8px 0 12px;letter-spacing:.01em;}
.tag{color:var(--dim);text-align:center;max-width:440px;margin:0 auto 18px;font-size:14px;}

/* --- bouton principal --- */
.cta{display:block;width:100%;margin:16px auto 0;max-width:360px;cursor:pointer;
  font-family:var(--sans);font-size:15px;font-weight:600;letter-spacing:.04em;color:var(--bg);
  background:var(--ember);border:none;border-radius:8px;padding:13px 18px;transition:.15s;}
.cta:hover{filter:brightness(1.08);}
.sticky-cta{position:sticky;bottom:12px;z-index:8;box-shadow:0 10px 30px rgba(0,0,0,.55);}
.sticky-bot{position:sticky;bottom:12px;z-index:7;background:var(--bg2);box-shadow:0 10px 30px rgba(0,0,0,.55);}
.cta:active{transform:translateY(1px);}

.mini{cursor:pointer;font-family:var(--sans);font-size:12.5px;color:var(--ink);background:var(--bg3);
  border:1px solid var(--line2);border-radius:6px;padding:6px 11px;transition:.14s;white-space:nowrap;}
.mini:hover:not(:disabled){border-color:var(--ember);color:var(--ember);}
.mini:disabled{opacity:.35;cursor:not-allowed;}
.mini.danger:hover:not(:disabled){border-color:var(--blood);color:var(--blood);}

/* ====== TITRE / CHOIX / FIN ====== */
.title-screen,.over,.choose{padding-top:14px;}
.rec{text-align:center;color:var(--faint);font-size:12.5px;margin-top:14px;font-family:var(--mono);}
.how{margin-top:22px;border-top:1px solid var(--line);padding-top:12px;}
.how summary{cursor:pointer;color:var(--dim);font-size:13px;letter-spacing:.04em;list-style:none;}
.how summary::-webkit-details-marker{display:none;}
.how summary::before{content:"+ ";color:var(--ember);}
.how[open] summary::before{content:"– ";}
.how div{color:var(--dim);font-size:13.5px;line-height:1.6;margin-top:10px;}
.how b{color:var(--ink);}
.how .k{font-family:var(--mono);color:var(--ember);}

.fixed-team{display:flex;gap:8px;font-size:13px;color:var(--dim);margin-bottom:4px;}
.fixed-team span{flex:1;text-align:center;padding:8px;border:1px solid var(--line);border-radius:7px;background:var(--bg2);}
.fixed-team .q{color:var(--ember);border-color:var(--ember-soft);font-weight:700;}
.picks{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.pick{cursor:pointer;text-align:left;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:13px 15px;transition:.15s;color:var(--ink);}
.pick:hover{border-color:var(--ember);background:var(--bg3);}
.pick-name{font-weight:600;font-size:16px;}
.pick-role{color:var(--ember);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:1px;}
.pick-stats{font-family:var(--mono);font-size:12.5px;color:var(--dim);margin:7px 0 5px;}
.pick-skill{font-size:13px;color:var(--dim);}
.pick-skill b{color:var(--ink);}

.over h1{margin-top:8px;}
.over.win h1{color:var(--ember);}
.over.lose h1{color:var(--blood);}
.result{text-align:center;font-size:14px;color:var(--dim);margin:6px 0;}
.result b{color:var(--ink);font-family:var(--mono);}

/* ====== COMBAT ====== */
.row{display:grid;gap:8px;grid-template-columns:repeat(3,1fr);}
.row.mons{margin-bottom:2px;}
@media (max-width:440px){ .row{grid-template-columns:repeat(2,1fr);} }
.unit{text-align:left;border:1px solid var(--line);border-radius:9px;padding:10px 11px;background:var(--bg2);
  position:relative;transition:.14s;color:var(--ink);font-family:var(--sans);}
button.unit{cursor:pointer;}
button.unit:hover:not(:disabled){border-color:var(--line2);}
.unit .u-name{font-size:13.5px;font-weight:600;line-height:1.2;min-height:2.4em;display:flex;align-items:flex-start;}
.unit .u-bar{height:6px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden;margin:7px 0 5px;}
.unit .u-bar i{display:block;height:100%;border-radius:4px;transition:width .35s ease;}
.unit.mon .u-bar i{background:linear-gradient(90deg,#b8463b,var(--blood));}
.unit.hero .u-bar i{background:linear-gradient(90deg,#5f9a5a,var(--heal));}
.unit .u-foot{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--dim);}
.unit .u-int{color:var(--blood);}
.unit.mon.tgt{border-color:var(--ember);box-shadow:0 0 0 1px var(--ember-soft);}
.unit.mon.tgt::after{content:"cible";position:absolute;top:-8px;right:8px;font-size:9px;letter-spacing:.1em;
  background:var(--ember);color:var(--bg);padding:1px 6px;border-radius:8px;font-family:var(--sans);}
.unit.dead{opacity:.32;}
.unit.hero.active{border-color:var(--ember);background:var(--bg3);box-shadow:0 0 18px var(--ember-soft);}
.unit.hero.down{opacity:.4;}
.unit.hero .u-cd{color:var(--faint);}
.boss-tag{font-size:9px;letter-spacing:.1em;color:var(--gold);border:1px solid var(--gold);border-radius:6px;padding:0 4px;margin-left:6px;align-self:center;}
.downtag{font-size:10px;color:var(--blood);margin-left:6px;align-self:center;font-weight:400;}

.turnbar{margin-top:14px;border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--bg2);}
.turnwho{font-size:12.5px;color:var(--dim);margin-bottom:9px;}
.turnwho b{color:var(--ember);}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.act{cursor:pointer;font-family:var(--sans);font-size:13.5px;color:var(--ink);background:var(--bg3);
  border:1px solid var(--line2);border-radius:7px;padding:11px 8px;transition:.14s;font-weight:500;}
.act:hover:not(:disabled){border-color:var(--ember);color:var(--ember);}
.act:disabled{opacity:.34;cursor:not-allowed;}
.hint{margin-top:9px;font-size:11.5px;color:var(--faint);}
.clog{margin-top:12px;font-family:var(--mono);font-size:11.5px;color:var(--faint);line-height:1.7;min-height:2em;}
.clog .cl-new{color:var(--ink);}

/* ====== RELICS ====== */
.relics{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 4px;}
.relic{display:inline-flex;align-items:center;justify-content:center;width:27px;height:27px;border:1px solid var(--ember-soft);
  border-radius:7px;background:var(--bg2);color:var(--ember);font-size:14px;cursor:default;transition:.14s;}
.relic:hover{border-color:var(--ember);box-shadow:0 0 10px var(--ember-soft);transform:translateY(-1px);}

/* ====== COMBAT TILE HEAD / SIGILS ====== */
.unit .u-head{display:flex;align-items:center;gap:7px;min-height:2.4em;}
.unit .u-name{min-height:0;display:inline;font-size:13.5px;font-weight:600;line-height:1.25;}
.sig{flex:none;width:21px;height:21px;display:flex;align-items:center;justify-content:center;border-radius:6px;
  font-size:12.5px;border:1px solid var(--line2);line-height:1;}
.msig{color:var(--blood);background:rgba(208,89,77,.08);}
.hsig{color:var(--ember);background:var(--ember-soft);}
.cls-guerriere .hsig{color:var(--steel);} .cls-archere .hsig{color:var(--ember);}
.cls-mage .hsig{color:var(--amethyst);} .cls-soigneur .hsig{color:var(--heal);} .cls-roublard .hsig{color:var(--gold);}

/* ====== INTENT BADGE ====== */
.unit.mon{padding-top:24px;}
.intent{position:absolute;top:7px;right:8px;font-family:var(--mono);font-size:11px;font-weight:600;
  padding:2px 7px;border-radius:8px;letter-spacing:.01em;border:1px solid var(--line2);background:var(--bg);white-space:nowrap;}
.i-attack{color:var(--blood);border-color:var(--blood-soft);}
.i-aoe{color:#ff8763;border-color:var(--blood);background:rgba(208,89,77,.13);}
.i-heal{color:var(--heal);border-color:rgba(95,154,90,.4);}
.i-buff{color:var(--gold);border-color:rgba(217,178,91,.4);}
.it-x{opacity:.9;}

/* ====== STATUS ICONS ====== */
.statline{display:flex;align-items:center;gap:6px;font-family:var(--mono);}
.st{font-size:11px;line-height:1;}
.st-psn{color:#a982cf;}
.st-vuln{color:#ff8763;font-weight:700;}
.st-shield{color:var(--steel);font-size:10.5px;}

/* ====== REACTION ANIMATIONS ====== */
@keyframes uhit{0%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}100%{transform:translateX(0)}}
@keyframes uflash{0%{box-shadow:0 0 0 0 rgba(208,89,77,0)}30%{box-shadow:0 0 14px 2px rgba(208,89,77,.55)}100%{box-shadow:0 0 0 0 rgba(208,89,77,0)}}
@keyframes uheal{0%{box-shadow:0 0 0 0 rgba(95,154,90,0)}30%{box-shadow:0 0 14px 2px rgba(95,154,90,.5)}100%{box-shadow:0 0 0 0 rgba(95,154,90,0)}}
@keyframes ublock{0%{box-shadow:0 0 0 0 rgba(111,155,196,0)}30%{box-shadow:0 0 12px 2px rgba(111,155,196,.6)}100%{box-shadow:0 0 0 0 rgba(111,155,196,0)}}
.unit.u-hit{animation:uhit .32s ease, uflash .42s ease;}
.unit.u-heal{animation:uheal .42s ease;}
.unit.u-block{animation:ublock .42s ease;}

/* ====== DEATH FADE ====== */
.unit.dead{opacity:.3;filter:grayscale(.7);transition:opacity .4s ease, filter .4s ease;}
.unit.mon.dead .intent{display:none;}

/* ====== TANIÈRE / ARBRE DE LA MEUTE ====== */
.lair-head{max-width:620px;margin:6px auto 16px;text-align:center;}
.lair-head h2{font-size:20px;color:var(--ember);margin:0 0 8px;letter-spacing:.01em;}
.lair-sub{color:var(--dim);font-size:13px;line-height:1.55;margin:0 auto 12px;max-width:560px;}
.troph-bal{font-family:var(--mono);font-size:14px;color:var(--ink);border:1px solid var(--ember-soft);
  background:var(--ember-soft);border-radius:9px;padding:8px 14px;display:inline-block;}
.troph-bal b{color:var(--ember);}
.tree{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:800px;margin:0 auto;}
@media (max-width:680px){ .tree{grid-template-columns:repeat(2,1fr);} }
@media (max-width:380px){ .tree{grid-template-columns:1fr;} }
.tbranch{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:10px;}
.tb-head{display:flex;align-items:center;gap:7px;margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.tb-ic{width:24px;height:24px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:6px;
  background:var(--ember-soft);color:var(--ember);font-size:13px;}
.tb-nom{font-weight:600;font-size:14px;flex:1;}
.tb-lvl{font-family:var(--mono);font-size:11px;color:var(--faint);}
.tb-lvl.full{color:var(--ember);}
.tnodes{display:flex;flex-direction:column;align-items:stretch;}
.tn-link{width:2px;height:9px;background:var(--line2);margin:0 auto;}
.tnode{text-align:left;border:1px solid var(--line);border-radius:8px;padding:8px 9px;background:var(--bg3);
  color:var(--ink);font-family:var(--sans);transition:.14s;cursor:default;}
.tn-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:3px;}
.tn-name{font-weight:600;font-size:12.5px;}
.tn-cost{font-family:var(--mono);font-size:11px;color:var(--ember);white-space:nowrap;}
.tn-on{font-family:var(--mono);font-size:10px;color:var(--heal);white-space:nowrap;}
.tn-desc{font-size:11px;color:var(--dim);line-height:1.4;}
.tnode.owned{border-color:var(--ember-soft);background:rgba(224,145,63,.06);}
.tnode.owned .tn-name{color:var(--ember);}
.tnode.avail{cursor:pointer;border-color:var(--line2);}
.tnode.avail:hover{border-color:var(--ember);box-shadow:0 0 14px var(--ember-soft);transform:translateY(-1px);}
.tnode.soon{opacity:.78;}
.tnode.soon .tn-cost{color:var(--faint);}
.tnode.locked{opacity:.4;}
.btn2.wide{max-width:520px;}
.savebox{max-width:520px;margin:18px auto 0;border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:var(--bg2);}
.sb-h{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ember);margin-bottom:7px;}
.sb-note{font-size:11.5px;color:var(--dim);line-height:1.5;margin:0 0 10px;}
.sb-row{display:flex;gap:8px;margin-bottom:8px;}
.sb-in{flex:1;min-width:0;background:var(--bg3);border:1px solid var(--line2);border-radius:7px;color:var(--ink);font-family:var(--mono);font-size:11.5px;padding:8px 10px;}
.sb-in::placeholder{color:var(--faint);}
.troph-won{text-align:center;font-family:var(--mono);font-size:15px;color:var(--ember);margin:10px 0 2px;font-weight:700;}
.twn-sub{display:block;font-size:11px;color:var(--faint);font-weight:400;margin-top:2px;letter-spacing:.02em;}

/* ====== CAMP ====== */
.loot{border:1px solid var(--ember-soft);background:var(--ember-soft);border-radius:10px;padding:11px 13px;margin-bottom:14px;}
.loot-h{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ember);margin-bottom:8px;}
.loot-mats{margin-bottom:7px;}
.loot-gear{display:flex;flex-direction:column;gap:3px;}
.loot-item{font-size:13px;}
.loot-item small{color:var(--faint);}
.dim{color:var(--faint);font-size:13px;}

.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-family:var(--mono);font-size:11.5px;color:var(--dim);border:1px solid var(--line);border-radius:14px;padding:4px 9px;background:var(--bg2);}

.strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:14px;position:sticky;top:0;z-index:8;background:var(--bg);padding-top:10px;}
.tab{flex:1;cursor:pointer;background:none;border:none;color:var(--dim);font-family:var(--sans);font-size:13px;
  letter-spacing:.04em;padding:10px 6px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.14s;}
.tab:hover{color:var(--ink);}
.tab.on{color:var(--ember);border-bottom-color:var(--ember);}
.tabbody{min-height:120px;}

/* équipe */
.rest-row{margin-bottom:12px;}
.hcard{border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:10px;background:var(--bg2);}
.hcard.down{border-color:var(--blood-soft);}
.hc-top{display:flex;align-items:baseline;gap:9px;}
.hc-top b{font-size:15px;}
.hc-top .role{font-size:11px;color:var(--ember);letter-spacing:.1em;text-transform:uppercase;}
.hc-stats{font-family:var(--mono);font-size:12.5px;color:var(--dim);margin:8px 0 10px;display:flex;gap:13px;flex-wrap:wrap;}
.slots{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.slot{display:flex;align-items:center;gap:9px;font-size:12.5px;}
.slot-k{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);width:62px;flex:0 0 auto;}
.slot.slot-col{flex-direction:column;align-items:stretch;gap:5px;}
.slot.slot-col .slot-k{width:auto;}
.eqchips{display:flex;flex-wrap:wrap;gap:5px;}
.eqs{cursor:pointer;text-align:left;font-family:var(--sans);font-size:11.5px;color:var(--ink);background:var(--bg3);
  border:1px solid var(--line2);border-left:3px solid var(--line2);border-radius:7px;padding:6px 9px;transition:.14s;}
.eqs:hover{border-color:var(--ember);transform:translateX(2px);}
.eqs .gs{color:var(--dim);}
.gear-mini{cursor:pointer;text-align:left;flex:1;background:var(--bg3);border:1px solid var(--line);border-left-width:2px;border-radius:6px;
  padding:6px 9px;font-family:var(--sans);font-size:12px;color:var(--dim);transition:.14s;}
.gear-mini:hover{border-color:var(--blood);}
.gear-mini .gs{font-family:var(--mono);color:var(--faint);}
.slot .empty{color:var(--faint);flex:1;}
.hc-skill{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12.5px;color:var(--dim);
  border-top:1px solid var(--line);padding-top:9px;}
.hc-skill .maxed{color:var(--gold);font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
.hcard .mini.danger{margin-top:10px;}

/* sac */
.res-block{margin-bottom:16px;}
.rb-h{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;}
.empty-box{color:var(--faint);font-size:13px;border:1px dashed var(--line2);border-radius:8px;padding:14px;text-align:center;}
.gear-row{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-left-width:3px;border-radius:8px;
  padding:9px 11px;margin-bottom:7px;background:var(--bg2);}
.gr-main{flex:1;min-width:0;}
.gr-name{font-size:13.5px;font-weight:600;}
.gr-meta{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:1px;}
.gr-equip{display:flex;gap:5px;flex:0 0 auto;}
.eq{cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--dim);background:var(--bg3);border:1px solid var(--line2);
  border-radius:6px;padding:5px 7px;transition:.14s;}
.eq:hover{border-color:var(--ember);color:var(--ember);}

/* atelier */
.hintbox{font-size:12.5px;color:var(--faint);border:1px solid var(--line);border-radius:8px;padding:11px;margin-bottom:12px;background:var(--bg2);}
.recipe{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:8px;background:var(--bg2);}
.rc-mat{font-family:var(--mono);font-size:11px;margin-right:9px;white-space:nowrap;}
.rc-mat.ok{color:var(--dim);} .rc-mat.no{color:var(--blood);}
.rc-slot{color:var(--faint);}
.rc-main{flex:1;}
.rc-name{font-size:14px;font-weight:600;}
.rc-cost{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:2px;}

/* --- menus, passifs, talents, codex --- */
.btn2{display:block;width:100%;max-width:360px;margin:9px auto 0;cursor:pointer;font-family:var(--sans);
  font-size:13.5px;letter-spacing:.04em;color:var(--dim);background:transparent;border:1px solid var(--line2);
  border-radius:8px;padding:11px 16px;transition:.15s;}
.btn2:hover{border-color:var(--ember);color:var(--ember);}
.buffnote{margin-left:8px;font-size:10px;letter-spacing:.08em;color:var(--ember);border:1px solid var(--ember-soft);
  border-radius:8px;padding:1px 7px;font-family:var(--mono);}
.hc-flavor{font-size:12.5px;color:var(--faint);font-style:italic;margin:5px 0 8px;line-height:1.45;}
.passive{font-size:12px;color:var(--dim);background:var(--bg3);border:1px solid var(--line);border-radius:7px;
  padding:7px 9px;margin-bottom:9px;line-height:1.45;}
.passive b{color:var(--ink);}
.ps-tag{font-size:9px;letter-spacing:.1em;color:var(--ember);border:1px solid var(--ember-soft);border-radius:6px;
  padding:1px 5px;margin-right:4px;font-weight:700;}
.tcard{border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:10px;background:var(--bg2);}
.tc-top{display:flex;align-items:baseline;gap:9px;margin-bottom:9px;}
.tc-top b{font-size:15px;}
.tk{border:1px solid var(--line);border-radius:8px;padding:9px 10px;margin-bottom:7px;background:var(--bg3);}
.tk.locked{border-style:dashed;}
.tk-h{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:3px;}
.tk-name{font-size:13.5px;font-weight:600;}
.tk-lv{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.06em;}
.lock{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--blood);}
.tk-desc{font-size:12.5px;color:var(--dim);line-height:1.45;margin-bottom:8px;}
.maxed{color:var(--gold);font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
.pick-flavor{font-size:12px;color:var(--faint);font-style:italic;margin:5px 0 6px;}
.pick-line{font-size:12.5px;color:var(--dim);margin-top:5px;line-height:1.45;}
.pick-line b{color:var(--ink);}
.pick-line.dim2{color:var(--faint);}
.pick-line.dim2 b{color:var(--dim);}
.cxcard{border:1px solid var(--line);border-left:3px solid var(--line2);border-radius:9px;padding:13px;margin-bottom:10px;background:var(--bg2);}
.cxcard.boss{border-left-color:var(--gold);}
.cx-top{display:flex;align-items:baseline;justify-content:space-between;gap:9px;}
.cx-top b{font-size:15.5px;}
.cx-skill{font-size:12.5px;color:var(--dim);margin-top:6px;line-height:1.45;}
.cx-skill b{color:var(--ink);}
.sk-tag{display:inline-block;width:16px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--ember);
  border:1px solid var(--ember-soft);border-radius:5px;margin-right:4px;}
.trait{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border:1px solid var(--line2);
  border-radius:8px;padding:1px 7px;}
.trait.tboss{color:var(--gold);border-color:var(--gold);}
.cx-loot{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:8px;}
.elite-tag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--blood);border:1px solid var(--blood);
  border-radius:6px;padding:0 5px;margin-left:6px;align-self:center;}
.prop{font-size:9.5px;letter-spacing:.06em;color:var(--ember);border:1px solid var(--ember-soft);border-radius:6px;
  padding:0 5px;font-family:var(--sans);white-space:nowrap;}
.psn{color:var(--amethyst);margin-left:6px;align-self:center;font-size:12px;}

/* ====== CARTE ====== */
.party{display:flex;gap:7px;margin:2px 0 12px;}
.pchip{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:7px 8px;}
.pchip.down{opacity:.5;}
.pc-n{display:block;font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:5px 0 4px;}
.pc-bar i{display:block;height:100%;background:linear-gradient(90deg,#5f9a5a,var(--heal));transition:width .35s ease;}
.pchip.down .pc-bar i{background:var(--blood);}
.pc-hp{font-family:var(--mono);font-size:10.5px;color:var(--faint);}
.map-hint{font-size:12px;color:var(--dim);text-align:center;margin:2px 0 10px;}
.mapwrap{position:relative;z-index:0;display:flex;flex-direction:column;gap:0;margin-bottom:14px;}
.mrow{display:grid;grid-template-columns:repeat(3,1fr);gap:0;height:56px;}
.mnode{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;z-index:1;margin:5px 5px;border:1px solid var(--line);border-radius:11px;background:var(--bg2);
  color:var(--dim);font-family:var(--sans);cursor:default;transition:.14s;padding:5px 4px;}
.mnode.empty{visibility:hidden;}
.mnode .mn-ic{font-size:17px;line-height:1;}
.mnode .mn-lb{font-size:10px;letter-spacing:.04em;color:var(--faint);}
.mnode.lock{opacity:.34;}
.mnode.visited{opacity:.62;border-style:dashed;}
.mnode.visited::after{content:'✓';position:absolute;top:5px;right:7px;font-size:10px;color:var(--faint);}
.mnode.current{border-color:var(--ink);color:var(--ink);box-shadow:0 0 0 1px var(--line2) inset;}
.mnode.current::after{content:'ici';position:absolute;top:5px;right:7px;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.mnode.reach{cursor:pointer;border-color:var(--ember);color:var(--ink);box-shadow:0 0 14px var(--ember-soft);}
.mnode.reach:hover{background:var(--bg3);transform:translateY(-1px);}
.mnode.reach .mn-lb{color:var(--ember);}
.mnode.t-combat .mn-ic{color:var(--ink);}
.mnode.t-elite .mn-ic{color:var(--blood);}
.mnode.t-marchand .mn-ic{color:var(--ember);}
.mnode.t-evenement .mn-ic{color:var(--steel);}
.mnode.t-repos .mn-ic{color:var(--heal);}
.mnode.t-tresor .mn-ic{color:var(--gold);}
.mnode.t-boss{border-color:var(--blood-soft);}
.mnode.t-boss .mn-ic{color:var(--blood);font-size:20px;}
.mnode.t-boss.reach{border-color:var(--blood);box-shadow:0 0 16px var(--blood-soft);}
.mnode.t-boss.reach .mn-lb{color:var(--blood);}
.medges{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:visible;}
.medges line{stroke:var(--line2);stroke-width:1.4;vector-effect:non-scaling-stroke;}
.medges line.done{stroke:var(--ember);opacity:.5;}
.medges line.live{stroke:var(--ember);stroke-width:2.4;opacity:.92;}
.mnode.reach{animation:nodeP 2s ease-in-out infinite;}
.mnode.t-boss.reach{animation:bossP 2s ease-in-out infinite;}
@keyframes nodeP{0%,100%{box-shadow:0 0 14px var(--ember-soft);}50%{box-shadow:0 0 22px rgba(224,145,63,.42);}}
@keyframes bossP{0%,100%{box-shadow:0 0 16px var(--blood-soft);}50%{box-shadow:0 0 26px rgba(208,89,77,.5);}}
.gear-row,.gear-mini,.eqs,.shop-row{box-shadow:-7px 0 14px -11px var(--rc, transparent);}
.optim{font-size:10.5px;color:var(--ember);letter-spacing:.02em;white-space:nowrap;}
.optim.ideal{color:var(--heal);}
.gr-opt{margin-top:3px;}
/* ====== RENCONTRE ====== */
.enc{max-width:440px;margin:6px auto 0;text-align:center;}
.enc-ic{font-size:30px;color:var(--ember);text-align:center;margin:6px 0 2px;}
.enc h2{font-size:18px;letter-spacing:.01em;margin:2px 0 8px;color:var(--ink);}
.enc-text{font-size:13.5px;color:var(--dim);line-height:1.6;margin-bottom:16px;}
.enc-opts{display:flex;flex-direction:column;gap:9px;text-align:left;}
.enc-opt{cursor:pointer;background:var(--bg2);border:1px solid var(--line);border-left:2px solid var(--ember);
  border-radius:9px;padding:12px 14px;transition:.14s;color:var(--ink);font-family:var(--sans);}
.enc-opt:hover:not(:disabled){background:var(--bg3);transform:translateX(2px);}
.enc-opt:disabled{opacity:.4;cursor:not-allowed;border-left-color:var(--faint);}
.eo-l{display:block;font-size:14px;font-weight:600;}
.eo-s{display:block;font-size:11.5px;color:var(--faint);margin-top:3px;font-family:var(--mono);}
.enc-result{font-size:14px;color:var(--ink);line-height:1.6;background:var(--bg2);border:1px solid var(--line);
  border-radius:10px;padding:14px 16px;margin:4px 0;text-align:left;}
/* ====== MARCHÉ ====== */
.ctr{text-align:center;}
.shop-sell-h{margin-top:14px;}
.shop-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--line);
  border-left:2px solid var(--line2);border-radius:9px;padding:10px 12px;margin-bottom:8px;}
.shop-row .gr-main{flex:1;min-width:0;}
/* ====== effets ====== */
#fxlayer{position:fixed;inset:0;pointer-events:none;z-index:60;}
.float{position:absolute;font-family:var(--mono);font-weight:700;font-size:16px;
  animation:floatup .95s ease forwards;text-shadow:0 1px 4px rgba(0,0,0,.8);}
.float.dmg{color:var(--blood);} .float.heal{color:var(--heal);} .float.shield{color:var(--steel);} .float.crit{color:var(--ember);font-size:20px;text-shadow:0 0 10px rgba(224,145,63,.7),0 1px 4px rgba(0,0,0,.85);}
@keyframes floatup{0%{opacity:0;transform:translate(-50%,6px);}20%{opacity:1;}100%{opacity:0;transform:translate(-50%,-34px);}}
#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);z-index:70;
  background:var(--bg3);border:1px solid var(--line2);color:var(--ink);font-size:13px;padding:9px 16px;border-radius:8px;
  opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ====== EMBLEMS & PORTRAITS ====== */
.emb{display:block;}
.portrait{position:relative;height:50px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;}
.portrait .emb{width:40px;height:40px;position:relative;z-index:1;}
.portrait::before{content:'';position:absolute;width:48px;height:48px;border-radius:50%;
  background:radial-gradient(circle, var(--pglow,rgba(208,89,77,.13)), transparent 70%);}
.portrait::after{content:'';position:absolute;bottom:1px;width:30px;height:6px;border-radius:50%;
  background:rgba(0,0,0,.4);filter:blur(2px);}
.mon-portrait{--pglow:rgba(208,89,77,.14);}
.mon-portrait .emb{color:var(--blood);}
.unit.mon.tgt .mon-portrait{--pglow:var(--ember-soft);}
.unit.mon.tgt .mon-portrait .emb{color:var(--ember);}
.unit.mon.boss .mon-portrait .emb{color:#ff8763;}
.unit.mon.boss .portrait::before,.unit.mon.elite .portrait::before{animation:auraPulse 1.9s ease-in-out infinite;}
@keyframes auraPulse{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.14);}}
.hero-portrait{--pglow:var(--ember-soft);}
.hero-portrait .emb{color:var(--ember);}
.cls-guerriere .hero-portrait{--pglow:rgba(111,155,196,.16);} .cls-guerriere .hero-portrait .emb{color:var(--steel);}
.cls-archere   .hero-portrait .emb{color:var(--ember);}
.cls-mage      .hero-portrait{--pglow:rgba(169,130,207,.16);} .cls-mage .hero-portrait .emb{color:var(--amethyst);}
.cls-soigneur  .hero-portrait{--pglow:rgba(95,154,90,.16);} .cls-soigneur .hero-portrait .emb{color:var(--heal);}
.cls-roublard  .hero-portrait{--pglow:rgba(217,178,91,.16);} .cls-roublard .hero-portrait .emb{color:var(--gold);}
.unit.down .hero-portrait{filter:grayscale(.8);opacity:.55;}
.unit.dead .mon-portrait{filter:grayscale(.85);opacity:.6;}

/* ====== MAP NODE ICONS ====== */
.mnode .mn-ic{width:23px;height:23px;display:flex;align-items:center;justify-content:center;font-size:0;}
.mnode .mn-ic .emb{width:21px;height:21px;color:var(--dim);}
.mnode.reach .mn-ic .emb{color:var(--ember);}
.mnode.current .mn-ic .emb{color:var(--ink);}
.t-tresor .mn-ic .emb{color:var(--gold);}
.t-repos .mn-ic .emb{color:var(--heal);}
.t-boss .mn-ic .emb{color:var(--blood);}

/* ====== AMBIANCE: embers + vignette ====== */
.wrap{position:relative;z-index:1;}
#embers{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.ember{position:absolute;bottom:-12px;border-radius:50%;
  background:radial-gradient(circle, var(--ember), rgba(224,145,63,0) 70%);
  opacity:0;animation:emberRise var(--dur,9s) linear var(--delay,0s) infinite;}
@keyframes emberRise{
  0%{transform:translate(0,0);opacity:0;}
  12%{opacity:var(--o,.4);}
  88%{opacity:var(--o,.4);}
  100%{transform:translate(var(--drift,0),-104vh);opacity:0;}
}
#vignette{position:fixed;inset:0;z-index:55;pointer-events:none;
  box-shadow:inset 0 0 140px 34px rgba(6,5,4,.5);
  background:radial-gradient(125% 85% at 50% 6%, transparent 56%, rgba(6,5,4,.34));}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important;transition-duration:.05s !important;}
}

/* ====== AMÉLIORATIONS : aperçu dégâts, deltas, Or, forge ====== */
.act{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;line-height:1.15;}
.act .act-n{font-weight:500;}
.act .act-dmg{font-family:var(--mono);font-size:10.5px;color:var(--faint);font-weight:400;}
.act:hover:not(:disabled) .act-dmg{color:var(--ember);}
.act .act-dmg.heal{color:var(--heal);}
.act:hover:not(:disabled) .act-dmg.heal{color:var(--heal);}
.who-gear{margin-top:9px;padding-top:8px;border-top:1px solid var(--line);font-size:11px;color:var(--dim);line-height:1.55;}
.who-gear .wg-stats{font-family:var(--mono);color:var(--ink);}
.who-gear .wg-load{color:var(--faint);}
.who-gear .wg-load b{color:var(--dim);font-weight:500;}
.delta{font-family:var(--mono);font-size:10.5px;white-space:nowrap;letter-spacing:.01em;}
.delta.up{color:var(--heal);} .delta.down{color:var(--blood);} .delta.same{color:var(--faint);}
.gr-delta{margin-top:3px;}
.eqs .delta,.gear-mini .delta{display:inline;}
.chip.gold{border-color:rgba(217,178,91,.4);color:var(--gold);}
.coin{color:var(--gold);}
.wallet{font-family:var(--mono);font-size:13.5px;color:var(--gold);border:1px solid rgba(217,178,91,.38);
  background:rgba(217,178,91,.08);border-radius:9px;padding:7px 13px;display:inline-block;margin-bottom:12px;}
.wallet b{color:var(--gold);}
.forge-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--line);
  border-left-width:3px;border-radius:9px;padding:10px 12px;margin-bottom:8px;}
.fg-main{flex:1;min-width:0;}
.fg-name{font-size:13.5px;font-weight:600;}
.fg-where{font-size:10.5px;color:var(--faint);font-weight:400;}
.fg-meta{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:2px;}
.fg-prev{font-family:var(--mono);font-size:11px;color:var(--heal);margin-top:3px;}
.maxplus{color:var(--gold);font-size:11px;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
.hot{color:var(--ember);font-weight:700;font-size:10px;vertical-align:middle;}
.gr-main.gr-click{cursor:pointer;background:none;border:none;font-family:var(--sans);text-align:left;padding:0;color:inherit;display:block;}
.gr-main.gr-click:hover .gr-name{text-decoration:underline;text-decoration-color:var(--ember);}
.gr-go{font-size:10px;color:var(--faint);font-weight:400;letter-spacing:.04em;}
.gr-main.gr-click:hover .gr-go{color:var(--ember);}
.tk.owned-perk{border-color:var(--ember-soft);background:rgba(224,145,63,.06);border-style:solid;}
.tk.owned-perk .tk-name{color:var(--ember);}
.tk-spec{margin-top:6px;}
.eq.danger{color:var(--blood);opacity:.9;}
.eq.danger:hover{border-color:var(--blood);color:var(--blood);opacity:1;}
.ic16{width:13px;height:13px;vertical-align:-2px;display:inline-block;}
.gname-ic{width:15px;height:15px;vertical-align:-3px;margin-right:1px;}
.chip .ic16{margin-right:2px;opacity:.92;}
.cx-loot .ic16{vertical-align:-2px;margin-right:1px;}
.lore-strip{display:flex;justify-content:center;gap:16px;margin:2px 0 14px;}
.lore-strip svg.emb{width:26px;height:26px;color:var(--faint);opacity:.62;transition:.2s;}
.lore-strip svg.emb.boss{color:var(--blood);opacity:.8;}
.lore-strip:hover svg.emb{opacity:.85;}
/* ===== NAV PERSISTANTE (hub) ===== */
.hubnav{position:sticky;bottom:0;z-index:30;display:flex;gap:2px;margin-top:16px;
  padding:5px 4px max(6px,env(safe-area-inset-bottom));border-radius:14px 14px 0 0;
  background:linear-gradient(180deg,rgba(19,18,16,.55),rgba(19,18,16,.98));backdrop-filter:blur(9px);
  border:1px solid var(--line2);border-bottom:none;box-shadow:0 -12px 34px rgba(0,0,0,.55);}
.hb{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  background:none;border:none;color:var(--faint);font-family:var(--sans);font-size:11px;letter-spacing:.02em;
  padding:7px 2px 4px;border-radius:11px;transition:.15s;min-height:54px;}
.hb .hb-ic{display:flex;color:var(--faint);transition:.15s;}
.hb .hb-svg{width:23px;height:23px;vertical-align:0;}
.hb:hover{color:var(--dim);}
.hb:hover .hb-ic{color:var(--dim);}
.hb.on{color:var(--hc);background:rgba(255,255,255,.05);}
.hb.on .hb-ic{color:var(--hc);filter:drop-shadow(0 0 6px var(--hc));}
.hb.on::after{content:'';position:absolute;top:-6px;left:26%;right:26%;height:3px;border-radius:2px;background:var(--hc);box-shadow:0 0 8px var(--hc);}
.hb-l .hot{font-size:8px;vertical-align:middle;color:var(--ember);}

/* ====== UI/UX PASS : mobile, sticky actions, icônes ====== */
.depthbar{height:4px;border-radius:3px;background:rgba(232,221,201,.08);overflow:hidden;margin:-4px 0 12px;}
.depthbar i{display:block;height:100%;background:linear-gradient(90deg,var(--ember),#ffc07a);border-radius:3px;transition:width .4s ease;}
/* sticky combat action bar so the menu is always reachable without scrolling */
.turnbar{position:sticky;bottom:max(8px,env(safe-area-inset-bottom));z-index:9;
  border:1px solid var(--line2);background:rgba(26,23,20,.97);
  box-shadow:0 -2px 0 rgba(0,0,0,.25),0 14px 34px rgba(0,0,0,.62);}
.act{min-height:62px;}
.act .act-ic{display:flex;justify-content:center;}
.act .aic{width:18px;height:18px;opacity:.8;}
.act:hover:not(:disabled) .aic{opacity:1;}
.act:disabled .aic{opacity:.4;}
/* icon camp tabs — bigger, app-like nav */
.camptabs{gap:2px;}
.camptabs .tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 8px;}
.camptabs .tab-ic{display:flex;color:var(--faint);transition:.14s;}
.camptabs .tab.on .tab-ic{color:var(--ember);}
.camptabs .tab:hover .tab-ic{color:var(--ink);}
.tab-svg{width:19px;height:19px;}
.tab-l{font-size:12px;letter-spacing:.02em;}
/* comfortable tap targets */
.mini,.eq{min-height:36px;}
.cta,.btn2{min-height:48px;}
@media (max-width:480px){
  body{font-size:14.5px;}
  .wrap{padding-left:max(env(safe-area-inset-left),12px);padding-right:max(env(safe-area-inset-right),12px);}
  h1{font-size:25px;letter-spacing:.12em;}
  .portrait{height:38px;margin-bottom:4px;} .portrait .emb{width:30px;height:30px;}
  .portrait::before{width:38px;height:38px;}
  .unit{padding:8px 9px;border-radius:8px;} .unit.mon{padding-top:22px;}
  .unit .u-name{font-size:12.5px;}
  .row{gap:6px;} .sect-label{margin:9px 0 5px;}
  .intent{font-size:10px;padding:1px 6px;}
  .actions{gap:6px;}
  .act{min-height:56px;padding:8px 3px;}
  .act .act-n{font-size:12px;line-height:1.1;}
  .act .aic{width:16px;height:16px;}
  .clog{margin-top:8px;font-size:11px;}
  .turnbar{padding:10px 9px;border-radius:12px;}
  .tabs{font-size:12px;}
  .camptabs .tab{padding:8px 2px 7px;}
  .tab-l{font-size:11px;}
  .hcard,.tcard,.gear-row,.forge-row,.shop-row{padding:10px 11px;}
  .cta,.btn2{min-height:50px;font-size:15px;}
  .mini,.eq{min-height:38px;}
  .map-hint,.enc-text{font-size:13px;}
  .mrow{height:52px;}
}
@media (max-width:360px){
  .act .act-n{font-size:11px;}
  .pick-name{font-size:15px;}
}

/* ====== PROFONDEUR : péril, défense, inspect, juice ====== */
.peril-pick{max-width:360px;margin:14px auto 2px;border:1px solid var(--line2);border-radius:11px;padding:11px 13px;background:var(--bg2);}
.peril-h{font-size:12.5px;color:var(--dim);text-align:center;letter-spacing:.04em;}
.peril-h b{color:var(--blood);font-family:var(--mono);}
.peril-chips{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin:8px 0;}
.pchip2{cursor:pointer;font-family:var(--mono);font-size:13px;color:var(--dim);background:var(--bg3);border:1px solid var(--line2);border-radius:8px;min-width:36px;min-height:36px;padding:5px 9px;transition:.14s;}
.pchip2:hover{border-color:var(--blood);color:var(--ink);}
.pchip2.on{background:var(--blood-soft);border-color:var(--blood);color:var(--blood);font-weight:700;}
.peril-desc{font-size:11.5px;color:var(--faint);text-align:center;line-height:1.4;}
.peril-up{max-width:420px;margin:10px auto 0;border:1px solid var(--blood);background:var(--blood-soft);border-radius:9px;padding:9px 12px;color:var(--ink);font-size:13px;text-align:center;}
.peril-up b{color:var(--blood);font-family:var(--mono);}
.st-guard{color:var(--steel);}
.act-dmg.shield{color:var(--steel);}
.act:hover:not(:disabled) .act-dmg.shield{color:var(--steel);}
@keyframes wshake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.wrap.shake{animation:wshake .34s ease;}
.relic{cursor:pointer;}
.hc-skill .prop{cursor:pointer;}
/* bottom-sheet inspect (mobile tooltips) */
.isheet-back{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;animation:fadein .2s ease;}
.isheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:520px;z-index:81;
  background:var(--bg2);border:1px solid var(--line2);border-bottom:none;border-radius:16px 16px 0 0;
  padding:16px 18px max(18px,env(safe-area-inset-bottom));box-shadow:0 -12px 40px rgba(0,0,0,.62);animation:sheetup .24s cubic-bezier(.2,.8,.2,1);}
@keyframes sheetup{from{transform:translate(-50%,100%);}to{transform:translate(-50%,0);}}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}
.ish-h{display:flex;align-items:center;gap:9px;font-size:16px;margin-bottom:8px;}
.ish-ic{color:var(--ember);font-size:18px;line-height:1;}
.ish-x{margin-left:auto;background:var(--bg3);border:1px solid var(--line2);color:var(--dim);border-radius:7px;min-width:34px;min-height:34px;cursor:pointer;font-size:14px;}
.ish-x:hover{border-color:var(--ember);color:var(--ember);}
.ish-body{font-size:13.5px;color:var(--dim);line-height:1.55;}
.ish-body p{margin:0 0 6px;}
.ish-cost{font-family:var(--mono);color:var(--faint);font-size:12px;}

/* ===== ILLUSTRATIONS / PORTRAITS ===== */
.bigpix{width:100%;height:100%;display:block;}
.cxcard{display:flex;gap:13px;align-items:flex-start;}
.cx-portrait{flex:0 0 74px;width:74px;height:74px;filter:drop-shadow(0 3px 7px rgba(0,0,0,.5));}
.cx-portrait.sm{flex:0 0 52px;width:52px;height:52px;}
.cx-main{flex:1;min-width:0;}
.relic-med{display:flex;align-items:center;justify-content:center;font-size:23px;color:var(--gold);border-radius:50%;background:radial-gradient(circle at 50% 36%,rgba(217,178,91,.28),#1a1714 62%,#0b0a08);border:1px solid rgba(217,178,91,.25);}
.pick-head{display:flex;align-items:center;gap:11px;margin-bottom:7px;}
.pick-port{flex:0 0 54px;width:54px;height:54px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.5));}
.ft-port{width:42px;height:42px;margin:0 auto 5px;}
.portrait::before{width:50px;height:50px;border:1px solid rgba(232,221,201,.12);box-shadow:inset 0 0 12px rgba(0,0,0,.55);}
@media (max-width:380px){ .cx-portrait{flex-basis:60px;width:60px;height:60px;} }

/* ===== CAMP — cohérence visuelle ===== */
.hc-head{display:flex;align-items:center;gap:12px;margin-bottom:9px;}
.hc-port{flex:0 0 56px;width:56px;height:56px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.5));}
.hc-port.sm{flex:0 0 48px;width:48px;height:48px;}
.hc-id{flex:1;min-width:0;}
.hc-id .hc-stats{margin:7px 0 0;}
.gr-med,.rc-med{flex:0 0 44px;width:44px;height:44px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.45));}
.hcard,.tcard{background:linear-gradient(180deg,var(--bg3),var(--bg2));border-radius:12px;border-left:3px solid var(--line2);}
.gear-row,.forge-row,.recipe,.shop-row{background:linear-gradient(180deg,var(--bg3),var(--bg2));}
.recipe{align-items:center;}
.hcard.cls-guerriere,.tcard.cls-guerriere{border-left-color:var(--steel);}
.hcard.cls-archere,.tcard.cls-archere{border-left-color:var(--ember);}
.hcard.cls-mage,.tcard.cls-mage{border-left-color:var(--amethyst);}
.hcard.cls-soigneur,.tcard.cls-soigneur{border-left-color:var(--heal);}
.hcard.cls-roublard,.tcard.cls-roublard{border-left-color:var(--gold);}
@media (max-width:380px){ .hc-port{flex-basis:48px;width:48px;height:48px;} .gr-med,.rc-med{flex-basis:38px;width:38px;height:38px;} }

/* ===== POLISH GLOBAL : plus accrocheur ===== */
body{background:
  radial-gradient(120% 78% at 50% -12%, var(--accent-soft), transparent 54%),
  radial-gradient(110% 60% at 50% 112%, rgba(208,89,77,.07), transparent 55%),
  var(--bg);background-attachment:fixed;}
*::-webkit-scrollbar{width:10px;height:10px;}
*::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:6px;border:2px solid var(--bg);}
*::-webkit-scrollbar-thumb:hover{background:#352a1f;}
.cta{background:linear-gradient(180deg,#f2a652,#dd8327);box-shadow:0 6px 18px rgba(224,145,63,.30),inset 0 1px 0 rgba(255,255,255,.28);letter-spacing:.06em;}
.cta:hover{filter:brightness(1.06);box-shadow:0 9px 28px rgba(224,145,63,.45),inset 0 1px 0 rgba(255,255,255,.34);}
.btn2{background:linear-gradient(180deg,rgba(42,35,28,.55),rgba(26,23,20,.55));}
.btn2:hover{background:linear-gradient(180deg,rgba(62,49,36,.7),rgba(42,35,28,.7));box-shadow:0 5px 18px rgba(0,0,0,.42);}
.cxcard,.hcard,.tcard,.gear-row,.forge-row,.recipe,.shop-row,.tbranch,.enc-opt,.mnode{transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;}
.cxcard:hover,.gear-row:hover,.forge-row:hover,.shop-row:hover{transform:translateY(-1px);}
.sect-label{color:var(--ember);opacity:.7;}
/* ===== TITRE ===== */
.mark-big .claw{width:54px;height:54px;animation:markglow 3.6s ease-in-out infinite;}
@keyframes markglow{0%,100%{filter:drop-shadow(0 0 13px rgba(224,145,63,.35));}50%{filter:drop-shadow(0 0 28px rgba(224,145,63,.72));}}
.title-screen h1{background:linear-gradient(180deg,#f6eedd,#caa46d);-webkit-background-clip:text;background-clip:text;color:transparent;}
.title-heroes{display:flex;justify-content:center;gap:9px;margin:16px 0 6px;}
.th-med{width:48px;height:48px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));transition:transform .18s ease;}
.th-med:hover{transform:translateY(-4px) scale(1.07);}
.how summary:hover{color:var(--ember);}
/* ===== CARTE ===== */
.mnode{background:linear-gradient(180deg,var(--bg3),var(--bg2));}
.mnode.reach{box-shadow:0 0 16px var(--ember-soft);}
.mnode.current{box-shadow:0 0 0 1px var(--ink) inset,0 0 14px rgba(232,221,201,.18);}
.pchip{background:linear-gradient(180deg,var(--bg3),var(--bg2));}
/* ===== RENCONTRE / MARCHÉ : médaillon d'icône ===== */
.enc-ic{display:flex;align-items:center;justify-content:center;width:66px;height:66px;margin:10px auto 8px;border-radius:50%;
  background:radial-gradient(circle at 50% 34%,var(--ember-soft),#1a1714 64%,#0b0a08);border:1px solid var(--line2);
  box-shadow:0 8px 22px rgba(0,0,0,.5),inset 0 0 18px rgba(224,145,63,.12);color:var(--ember);font-size:30px;line-height:1;}
.enc-opt{background:linear-gradient(180deg,var(--bg3),var(--bg2));}
.enc-opt:hover:not(:disabled){box-shadow:0 5px 16px rgba(0,0,0,.42);}
.enc-result{background:linear-gradient(180deg,var(--bg3),var(--bg2));}
.gr-med.relic-med{display:flex;align-items:center;justify-content:center;font-size:22px;}
/* ===== FIN DE PARTIE ===== */
.over .mark-big .claw{width:60px;height:60px;}
.over.win h1{text-shadow:0 0 26px rgba(224,145,63,.55);}
.over.lose h1{text-shadow:0 0 26px rgba(208,89,77,.45);}
.troph-won{border:1px solid var(--ember-soft);background:var(--ember-soft);border-radius:10px;padding:9px 14px;display:inline-block;}
/* ===== TANIÈRE ===== */
.tbranch{background:linear-gradient(180deg,var(--bg3),var(--bg2));}
.tb-ic{box-shadow:inset 0 0 10px rgba(224,145,63,.18);}
.tnode.avail{background:linear-gradient(180deg,rgba(224,145,63,.05),var(--bg3));}
.troph-bal{box-shadow:0 4px 16px rgba(224,145,63,.12);}
.run-summary{max-width:420px;margin:14px auto 4px;border:1px solid var(--line2);border-radius:11px;padding:12px 14px;background:linear-gradient(180deg,var(--bg3),var(--bg2));}
.rs-h{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ember);text-align:center;margin-bottom:10px;}
.rs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rs-grid>div{text-align:center;background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:9px 6px;}
.rs-grid b{display:block;font-family:var(--mono);font-size:20px;color:var(--ink);}
.rs-grid span{font-size:11px;color:var(--dim);}
.unlock-row{display:flex;align-items:center;gap:9px;padding:7px 2px;border-top:1px solid var(--line);font-size:12.5px;}
.unlock-row:first-of-type{border-top:none;}
.ul-ic{font-size:13px;color:var(--faint);}
.unlock-row.done .ul-ic{color:var(--heal);}
.ul-n{flex:1;color:var(--dim);}
.unlock-row.done .ul-n{color:var(--ink);}
.ul-how{font-size:11px;color:var(--faint);font-family:var(--mono);}
.unlock-row.done .ul-how{color:var(--heal);}
/* ===== FOG MAP ===== */
.mnode.fog{opacity:.45;border-style:dashed;cursor:default;}
.mnode.fog .mn-ic{font-size:15px;color:var(--faint);}
.mnode.fog .mn-fog{font-family:var(--mono);}
.mnode.fog .mn-lb{color:var(--faint);letter-spacing:.2em;}
/* ===== TANIÈRE revamp ===== */
.lair-bonus{max-width:780px;margin:0 auto 16px;border:1px solid var(--accent-soft);background:rgba(255,255,255,.02);border-radius:12px;padding:12px 15px;}
.lb-h{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:9px;}
.chip.lbc{border-color:var(--accent-soft);color:var(--accent);background:rgba(255,255,255,.02);}
.tbranch{border-top:3px solid var(--bc);border-radius:12px;}
.tb-head{align-items:center;gap:10px;}
.tb-med{width:32px;height:32px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:9px;font-size:16px;color:var(--bc);background:var(--bg);border:1px solid var(--bc);box-shadow:0 0 12px -3px var(--bc);}
.tb-meta{flex:1;min-width:0;}
.tb-sub{display:block;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-top:1px;}
.tb-bar{height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:5px;}
.tb-bar i{display:block;height:100%;border-radius:3px;transition:width .4s ease;}
.tb-lvl{align-self:flex-start;}
.tn-link{width:2px;height:9px;margin:0 auto;opacity:.4;}
.tnode{border-left:3px solid transparent;}
.tnode.owned{border-color:var(--line2);border-left-color:var(--bc);background:rgba(255,255,255,.02);}
.tnode.owned .tn-name{color:var(--bc);}
.tnode.avail{border-color:var(--line2);border-left-color:var(--bc);box-shadow:0 0 0 1px var(--bc) inset;}
.tnode.avail:hover{box-shadow:0 0 16px -3px var(--bc),0 0 0 1px var(--bc) inset;transform:translateY(-1px);}
.tnode.soon{border-left-color:var(--bc);opacity:.7;}
.tn-on{color:var(--bc);font-family:var(--mono);font-weight:700;}
.tn-cost{color:var(--bc);}
/* ===== inspect units + journal ===== */
.u-info{position:absolute;top:7px;left:7px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-family:var(--mono);font-size:11px;font-style:italic;color:var(--faint);border:1px solid var(--line2);background:var(--bg);cursor:pointer;z-index:3;line-height:1;}
.u-info:hover{color:var(--ember);border-color:var(--ember);}
.isp-row{display:flex;gap:12px;align-items:center;margin-bottom:10px;}
.isp-port{width:64px;height:64px;flex:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));}
.isp-row .hc-stats{margin:0;}
.ish-sub{font-size:12px;color:var(--dim);margin:6px 0 0;line-height:1.5;}
.ish-sub b{color:var(--ink);}
.clog{border:1px solid var(--line);border-radius:9px;background:var(--bg2);padding:8px 11px 9px;min-height:2.4em;}
.clog-h{font-family:var(--sans);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;}
.clog .cl-new{color:var(--ink);}
.cl-empty{color:var(--faint);font-style:italic;}
/* ===== ÉLAN / FUREUR ===== */
.elanbar{display:flex;align-items:center;gap:8px;margin:-2px 0 10px;}
.elan-l{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);}
.elan-pips{display:flex;gap:4px;}
.ep{width:16px;height:7px;border-radius:3px;background:rgba(255,255,255,.08);border:1px solid var(--line2);transition:.2s;}
.ep.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px rgba(217,178,91,.4);}
.ep.on.rdy{background:var(--ember);border-color:var(--ember);box-shadow:0 0 8px var(--ember);}
.elan-rdy{font-size:10px;color:var(--ember);font-weight:700;letter-spacing:.04em;animation:rdypulse 1.2s ease-in-out infinite;}
@keyframes rdypulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.act.fureur.rdy{border-color:var(--ember);box-shadow:0 0 14px var(--ember-soft);}
.act.fureur.rdy .aic{color:var(--ember);}
.act.fureur:not(.rdy){opacity:.5;}
.mini .coin,.eq .coin,.wallet .coin{font-weight:700;}
.shop-row{align-items:center;}
.shop-row .mini{white-space:nowrap;}
.loot-h{color:var(--accent);}
/* ===== COMBAT UI clarté ===== */
.unit.mon{padding-top:10px;}
.intent-banner{margin-top:8px;display:flex;align-items:center;justify-content:center;gap:5px;font-family:var(--mono);font-size:12.5px;font-weight:600;padding:4px 8px;border-radius:7px;border:1px solid var(--line2);background:var(--bg);}
.intent-banner.i-attack{color:var(--blood);border-color:var(--blood-soft);background:rgba(208,89,77,.09);}
.intent-banner.i-aoe{color:#ff8763;border-color:var(--blood);background:rgba(208,89,77,.16);}
.intent-banner.i-heal{color:var(--heal);border-color:rgba(116,173,111,.4);background:rgba(116,173,111,.08);}
.intent-banner.i-buff,.intent-banner.i-rally{color:var(--gold);border-color:rgba(217,178,91,.4);background:rgba(217,178,91,.08);}
.intent-banner.i-venin,.intent-banner.i-wail{color:var(--amethyst);border-color:rgba(169,130,207,.4);background:rgba(169,130,207,.08);}
.intent-banner.i-summon{color:var(--steel);border-color:rgba(111,155,196,.4);background:rgba(111,155,196,.08);}
.mstats{font-family:var(--mono);font-size:10px;color:var(--faint);white-space:nowrap;}
.mon-status{margin-top:5px;justify-content:flex-start;gap:6px;}
.u-cd{font-family:var(--mono);font-size:10px;color:var(--ember);border:1px solid var(--ember-soft);border-radius:5px;padding:0 4px;}
.unit.hero.active::after{content:'à toi';position:absolute;top:-8px;right:8px;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;background:var(--ember);color:var(--bg);padding:1px 7px;border-radius:8px;font-weight:700;}
.turnwho{display:flex;align-items:center;gap:7px;}
.tw-port{display:inline-flex;width:24px;height:24px;border-radius:50%;background:var(--bg3);align-items:center;justify-content:center;}
.tw-port svg{width:16px;height:16px;color:var(--ember);}
/* ===== TRANSITIONS & CONFETTI ===== */
#app.fadein{animation:screenin .26s ease;}
@keyframes screenin{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}
.vfx-c{position:absolute;border-radius:2px;pointer-events:none;z-index:61;animation:confettifall linear forwards;}
@keyframes confettifall{0%{transform:translate(0,0) rotate(0deg);opacity:1;}100%{transform:translate(var(--dx,0),106vh) rotate(var(--rot,360deg));opacity:.85;}}
@media (prefers-reduced-motion: reduce){ #app.fadein{animation:none;} .vfx-c{display:none;} }

/* ===== VFX & POLISH ===== */
#flash{position:fixed;inset:0;z-index:58;pointer-events:none;opacity:0;transition:opacity .4s ease;mix-blend-mode:screen;}
.vfx-p{position:absolute;border-radius:50%;pointer-events:none;transform:translate(0,0) scale(1);opacity:1;transition:transform .55s cubic-bezier(.2,.7,.3,1),opacity .55s ease;}
.vfx-ring{position:absolute;width:34px;height:34px;border:2px solid;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%) scale(.6);opacity:.85;transition:transform .42s ease,opacity .42s ease;}
.float.death{display:none;}
.map-act{max-width:520px;margin:8px auto 2px;text-align:center;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);border-top:1px solid var(--line);padding-top:8px;}
.map-act.final{color:var(--blood);font-weight:700;}
.depthbar{position:relative;background-image:repeating-linear-gradient(90deg,transparent 0 calc(20% - 1.5px),rgba(0,0,0,.55) calc(20% - 1.5px) 20%);}
.unit{background:linear-gradient(180deg,var(--bg3),var(--bg2));}
.unit.mon.tgt{box-shadow:0 0 0 1px var(--ember),0 0 18px var(--ember-soft);}
.unit.hero.active{box-shadow:0 0 0 1px var(--ember-soft),0 0 22px var(--ember-soft);}
.unit.mon.boss{border-color:var(--blood-soft);background:linear-gradient(180deg,rgba(208,89,77,.10),var(--bg2));}
.unit.mon.enraged{border-color:var(--blood);}
.unit.mon.enraged .mon-portrait .emb{color:#ff6a5a;}
.unit .u-bar i{position:relative;overflow:hidden;}
.unit .u-bar i::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);transform:translateX(-120%);animation:barsheen 3s ease-in-out infinite;}
@keyframes barsheen{0%{transform:translateX(-120%);}60%,100%{transform:translateX(130%);}}
.unit.hero.low .portrait::before{animation:lowpulse 1s ease-in-out infinite;background:radial-gradient(circle,rgba(208,89,77,.45),transparent 70%);}
@keyframes lowpulse{0%,100%{opacity:.35;}50%{opacity:1;}}
@media (prefers-reduced-motion: reduce){ .unit .u-bar i::after{animation:none;display:none;} }

/* ============================================================ */
/* ===== THÈME PAR ZONE — couleur d'identité par écran ===== */
/* ============================================================ */
.top{border-bottom:1px solid var(--accent-soft);}
.top .mk .claw{color:var(--accent);transition:color .3s ease;}
.top .brand{color:var(--accent);}
.top .wave{color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-soft);border-radius:9px;padding:3px 10px;font-weight:600;}
.top .wave i{color:var(--accent);opacity:.55;}
.sect-label{color:var(--accent);opacity:.92;letter-spacing:.2em;}
.rb-h{color:var(--accent);display:flex;align-items:center;gap:7px;}
.rb-h::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px;display:inline-block;flex:none;}
.tabs{border-bottom-color:var(--accent-soft);}
.tabs .tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.depthbar i{background:var(--accent);}
.turnbar{border-top:2px solid var(--accent-soft);}
.hintbox{border-left:3px solid var(--accent-soft);}
.enc-ic{color:var(--accent);background:radial-gradient(circle at 50% 34%,var(--accent-soft),#1a1714 64%,#0b0a08);}
.wallet{border-color:var(--accent-soft);}

function strHash(s){ s=String(s); let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }

function unseedRNG(){ g_seedStr=null; RNG=Math.random; }
