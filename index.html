function makeHero(cls){ return {cls,nom:CLASSES[cls].nom,lvl:1,pv:CLASSES[cls].base.pv,
  gear:{arme:null,armure:null,talisman:null},skillLvl:1,skillBunlocked:false,skillBLvl:1,cdA:0,cdB:0,perks:[]}; }
function heroStats(h){
  const c=CLASSES[h.cls]; const f=1+0.085*(h.lvl-1);
  let pvMax=c.base.pv*f, atk=c.base.atk*f, def=c.base.def*f, vit=c.base.vit*f;
  for(const sl of ['arme','armure','talisman']){ const it=h.gear[sl]; if(it){
    pvMax+=it.stats.pvMax||0; atk+=it.stats.atk||0; def+=it.stats.def||0; vit+=it.stats.vit||0; } }
  if(hasRelic('coeur_de_pierre')) pvMax+=25;
  def+=perkSum(h,'defFlat');
  pvMax*=1+metaMods().hpPct/100;
  pvMax*=1+perkSum(h,'hpPct')/100;
  if(hasRelic('oeil_du_titan')) pvMax*=1.1;
  return {pvMax:Math.round(pvMax),atk:Math.round(atk),def:Math.round(def),vit:Math.round(vit)};
}
function heroAtk(h){ let a=heroStats(h).atk;
  if(CLASSES[h.cls].pid==='precision') a*=1.2;
  a*=1+perkSum(h,'dmgPct')/100;
  if(CLASSES[h.cls].pid==='frenesie'){ const _pm=heroStats(h).pvMax||1; a*=1+(1-Math.max(0,h.pv)/_pm)*0.5; }
  if(hasRelic('oeil_du_titan')) a*=1.1;
  if(g.buffAtk && g.buffAtk.turns>0) a*=(1+g.buffAtk.pct);
  return a; }
function heroHasProp(h,p){ return ['arme','armure','talisman'].some(sl=>h.gear[sl]&&h.gear[sl].prop===p); }
function skillCdA(h){ let b=CLASSES[h.cls].skill.cd; if(h.skillLvl>=3)b--; if(heroHasProp(h,'vif'))b--; if(hasRelic('fureur_du_loup'))b--; if(metaMods().cd)b--; b-=perkSum(h,'cd'); return Math.max(1,b); }
function skillCdB(h){ let b=CLASSES[h.cls].skillB.cd; if(h.skillBLvl>=3)b--; if(heroHasProp(h,'vif'))b--; if(hasRelic('fureur_du_loup'))b--; if(metaMods().cd)b--; b-=perkSum(h,'cd'); return Math.max(1,b); }

/* ============================================================ LOOT / GEAR */
function genGear(rarity, wave, forceSlot){
  const slot=forceSlot||pick(['arme','armure','talisman']);
  const ti=RARITIES.indexOf(rarity);
  let budget=Math.round((5+wave*1.3)*[0.7,1.05,1.5,2.1][ti]); if(budget<2) budget=2;
  const pools={arme:['atk','atk','vit'],armure:['def','pvMax','pvMax'],talisman:['atk','def','pvMax','vit']};
  const pool=pools[slot];
  const nStats=Math.min(1+ti,3);
  const chosen=[];
  for(let i=0;i<nStats;i++){ const opts=pool.filter(x=>!chosen.includes(x)); if(!opts.length) break; chosen.push(pick(opts)); }
  const alloc={};
  if(chosen.length===1){ alloc[chosen[0]]=budget; }
  else { const main=Math.ceil(budget*0.55); alloc[chosen[0]]=main;
    const each=Math.max(1,Math.floor((budget-main)/(chosen.length-1)));
    for(let i=1;i<chosen.length;i++) alloc[chosen[i]]=each; }
  const stats={};
  for(const st in alloc){ let v=alloc[st]; if(st==='pvMax') v*=3; stats[st]=Math.max(1,Math.round(v)); }
  const bases={arme:['Lame','Hache','Masse','Arc','Dague','Pique'],
    armure:['Cuirasse','Cotte','Plastron','Harnois','Tunique'],
    talisman:['Amulette','Fétiche','Sceau','Totem','Anneau']};
  const affix={atk:['de Sang','de Braise','du Traqueur','du Carnage'],
    def:['de Fer','de Pierre','du Gardien','du Rempart'],
    pvMax:['de l’Ours','du Colosse','de Vie','de Granit'],
    vit:['du Vent','du Loup','de l’Éclair','de Plume']};
  const nom=pick(bases[slot])+' '+pick(affix[chosen[0]]);
  const item={id:GEAR_ID++, slot, nom, rarity, stats};
  if(ti>=1 && chance(0.35)) item.prop=pick(GEAR_PROPS);
  return item;
}
function rollRarity(wave, boss){
  if(boss) return weightedPick({'commun':0,'rare':2,'épique':5,'légendaire':3});
  const t=Math.min(wave,10);
  return weightedPick({
    'commun':Math.max(1,9-t),
    'rare':5+Math.floor(t/2),
    'épique':Math.max(0,t-4),
    'légendaire':Math.max(0,t-8),
  });
}
function rollLoot(slain, wave){
  const mats={}, gear=[];
  const depthBonus=Math.floor(wave/4);
  slain.forEach(m=>{ const t=MONSTERS[m.tmpl];
    let n=rint(2,3)+depthBonus; if(m.elite) n+=2; if(m.boss) n+=5;
    for(let k=0;k<n;k++){ const mat=pick(t.loot); mats[mat]=(mats[mat]||0)+1; }
  });
  const boss=wave>=BOSS_WAVE;
  let drops = boss?2 : (chance(0.55)?1:0);
  for(let d=0;d<drops;d++) gear.push(genGear(rollRarity(wave,boss),wave));
  return {mats,gear};
}
function applyLoot(loot){ for(const m in loot.mats) g.inv.mats[m]=(g.inv.mats[m]||0)+loot.mats[m]; loot.gear.forEach(it=>g.inv.gear.push(it)); if(loot.gold) g.inv.gold=(g.inv.gold||0)+loot.gold; }
function lootSummary(loot){
  const parts=[];
  if(loot.gold) parts.push(`<div class="loot-mats"><span class="chip gold">+${loot.gold} Or ⊙</span></div>`);
  const mk=Object.keys(loot.mats);
  if(mk.length) parts.push(`<div class="loot-mats"><div class="chips">${mk.map(m=>`<span class="chip">${MAT_LABEL[m]} +${loot.mats[m]}</span>`).join('')}</div></div>`);
  if(loot.gear.length) parts.push(`<div class="loot-gear">${loot.gear.map(it=>`<span class="loot-item" style="color:${RAR_COLOR[it.rarity]}">${slotIcon(it.slot)} ${it.nom} <small>(${it.rarity}${it.prop?' · '+PROP_LABEL[it.prop]:''}) · ⌖ ${optimName(it)}</small></span>`).join('')}</div>`);
  if(!parts.length) return `<div class="dim">Aucun butin cette fois.</div>`;
  return parts.join('');
}

/* ============================================================ RUN */
const NODE={
  combat:{icon:'⚔',label:'Combat'},
  elite:{icon:'✦',label:'Élite'},
  marchand:{icon:'⬡',label:'Marché'},
  evenement:{icon:'?',label:'Mystère'},
  repos:{icon:'✚',label:'Repos'},
  tresor:{icon:'◆',label:'Trésor'},
  boss:{icon:'☠',label:'Béhémoth'},
};
const RUN_V=1;
function saveRun(){ if(!g) return; try{ const o={team:g.team,inv:g.inv,map:g.map,pos:g.pos,relics:g.relics,depthReached:g.depthReached,peril:g.peril,restedThisCamp:g.restedThisCamp,lastLoot:g.lastLoot,stats:g.stats,seed:g.seed,_v:RUN_V}; localStorage.setItem('meute_run',JSON.stringify(o)); }catch(e){} }
function loadRun(){ try{ const o=JSON.parse(localStorage.getItem('meute_run')||'null'); if(!o||o._v!==RUN_V||!o.team) return null; return o; }catch(e){ return null; } }
function hasRun(){ return !!loadRun(); }
function clearRun(){ try{ localStorage.removeItem('meute_run'); }catch(e){} }
function resumeRun(){ const o=loadRun(); if(!o){ toast('Aucune battue à reprendre.'); render(); return; } g=o; g.mons=[]; g.enc=null; g.shop=null; g.queue=null; g.buffAtk=null; g.stats=g.stats||{kills:0,gold:0,crits:0,nodes:0}; if(g.seed){ seedRNG(g.seed); } else { unseedRNG(); } ui.screen='map'; ui.target=0; render(); }
function newRun(thirdClass, seed){
  if(seed){ seedRNG(seed); } else { unseedRNG(); }
  g={ team:[ makeHero('guerriere'), makeHero('archere'), makeHero(thirdClass) ],
      mons:[], inv:{mats:{cuir:0,croc:0,os:0,fer:0,essence:0,herbe:0}, gear:[], potions:1, gold:0},
      lastLoot:null, buffAtk:null, log:[], depthReached:0, relics:[], stats:{kills:0,gold:0,crits:0,nodes:0}, seed:seed||null };
  const M=metaMods();
  g.inv.potions+=M.potions;
  g.inv.gold+=(M.startGold||0);
  g.peril=meta.peril||0; g.inv.potions=Math.max(0,g.inv.potions-perilMods().potionPenalty);
  if(M.mats){ ['cuir','croc','fer'].forEach(k=>g.inv.mats[k]+=M.mats); }
  if(M.skillB){ g.team.forEach(h=>{ h.skillBunlocked=true; }); }
  { let nRel=(M.startRelic?1:0); if(M.startRelic2) nRel=2; for(let z=0;z<nRel;z++){ if(relicsLeft()) addRelic(pick(availRelics()).id); } }
  genMap();
  g.secondWind=false; clearRun(); saveRun();
  meta.runs=(meta.runs||0)+1; save();
  ui.screen='map'; render();
}
function shuffleSlots(n){ const s=[0,1,2]; for(let i=s.length-1;i>0;i--){ const j=rint(0,i); const t=s[i]; s[i]=s[j]; s[j]=t; } return s.slice(0,n).sort((a,b)=>a-b); }
function weightedType(r){ return weightedPick({combat:6, elite:(r>=3?2:0), marchand:2, evenement:2, repos:1, tresor:1}); }
function ensureType(rows,type,rA,rB){
  for(let r=rA;r<=rB;r++) for(const n of rows[r]) if(n.type===type) return;
  const r=rint(rA,rB); const cand=rows[r].filter(n=>n.type==='combat'); (cand.length?pick(cand):pick(rows[r])).type=type;
}
function genMap(){
  const R=WAVES, rows=[];
  for(let r=0;r<R;r++){
    const depth=r+1; const isBoss=(depth%10===0);
    const slots = isBoss?[1]:shuffleSlots(rint(2,3));
    rows.push(slots.map(s=>({slot:s,type:'combat',next:[],visited:false,depth})));
  }
  for(let r=0;r<R;r++){ const depth=r+1;
    if(depth%10===0){ rows[r][0].type='boss'; }
    else if(depth%10===9){ rows[r].forEach(n=>n.type='repos'); }
    else if(depth>1){ rows[r].forEach(n=>{ n.type=weightedType(depth); }); }
  }
  for(let act=0; act<5; act++){ const a=act*10+1, b=act*10+7;
    ensureType(rows,'marchand',a,b); ensureType(rows,'evenement',a,b); ensureType(rows,'tresor',a,b); }
  for(let r=0;r<R-1;r++){
    const cur=rows[r], nxt=rows[r+1];
    cur.forEach(a=>{
      const cand=nxt.map((b,bi)=>({bi,d:Math.abs(b.slot-a.slot)})).sort((x,y)=>x.d-y.d);
      const k=Math.min(cand.length, RNG()<0.45?2:1);
      a.next=cand.slice(0,k).map(c=>c.bi);
    });
    nxt.forEach((b,bi)=>{ if(!cur.some(a=>a.next.includes(bi))){ let best=0,bd=99; cur.forEach((a,ai)=>{ const d=Math.abs(a.slot-b.slot); if(d<bd){bd=d;best=ai;} }); cur[best].next.push(bi); } });
  }
  g.map={rows,R}; g.pos={row:-1,node:-1};
}
function nodeState(r,i){
  const node=g.map.rows[r][i];
  if(node.visited) return (g.pos.row===r && g.pos.node===i)?'current':'visited';
  if(g.pos.row<0) return r===0?'reach':'lock';
  if(r===g.pos.row+1 && g.map.rows[g.pos.row][g.pos.node].next.includes(i)) return 'reach';
  return 'lock';
}
function chooseNode(r,i){
  if(nodeState(r,i)!=='reach') return;
  g.lastLoot=null; g.pendingNode={r,i};
  const node=g.map.rows[r][i]; g.depthReached=Math.max(g.depthReached||0,node.depth);
  resolveNode(node);
}
function resolveNode(node){
  switch(node.type){
    case 'combat': startCombat(node.depth,'normal'); break;
    case 'elite': startCombat(node.depth,'elite'); break;
    case 'boss': startCombat(node.depth,'boss'); break;
    case 'marchand': openShop(node.depth); break;
    case 'tresor': openTreasure(node.depth); break;
    case 'repos': openRest(); break;
    case 'evenement': openEvent(node.depth); break;
  }
}
function completeNode(){
  const {r,i}=g.pendingNode; const node=g.map.rows[r][i];
  node.visited=true; g.pos={row:r,node:i};
  if(node.type==='boss' && node.depth>=WAVES){ gameOver(true); return; }
  g.team.forEach(h=>{ if(h.pv>0){ const b=heroStats(h).pvMax; h.lvl++; const a=heroStats(h).pvMax; h.pv+=Math.max(0,a-b); } });
  try{ flashScreen('rgba(116,173,111,.16)'); sfx('heal'); }catch(e){}
  if(g.stats) g.stats.nodes++;
  saveRun();
  ui.screen='map'; render();
}

/* ============================================================ COMBAT */
function anyMonAlive(){ return g.mons.some(m=>m.pv>0); }
function anyHeroAlive(){ return g.team.some(h=>h.pv>0); }
function monAlive(i){ return g.mons[i] && g.mons[i].pv>0; }
function firstLivingMon(){ const i=g.mons.findIndex(m=>m.pv>0); return i<0?0:i; }
function clog(t){ g.log.unshift(t); if(g.log.length>12) g.log.pop(); }
function fx(targetId,txt,cls){ ui._fx.push({targetId,txt,cls}); if(cls==='crit'){ sfx('crit'); shake(); } else if(cls==='dmg') sfx('hit'); else if(cls==='heal') sfx('heal'); else if(cls==='shield') sfx('block'); }

function makeMon(id, w, elite){
  const t=MONSTERS[id]; const f=1+0.07*(w-1)+0.0008*(w-1)*(w-1);
  let pvMax=Math.round(t.pv*f*(t.boss?6:1));
  let atk=Math.round(t.atk*f*(t.boss?1.3:1));
  let def=Math.round(t.def*f);
  let eliteNom=null;
  if(elite && MODIFIERS[elite]){ const md=MODIFIERS[elite];
    if(md.atk) atk=Math.round(atk*md.atk);
    if(md.def) def=Math.round(def*md.def);
    if(md.pv) pvMax=Math.round(pvMax*md.pv);
    eliteNom=md.nom; }
  { const pm=perilMods(); pvMax=Math.round(pvMax*(1+pm.monPv/100)); atk=Math.round(atk*(1+pm.monAtk/100)); }
  return {tmpl:id, nom:t.nom, pvMax, pv:pvMax, atk, def, vit:t.vit, magic:!!t.magic, boss:!!t.boss, heal:!!t.heal,
    elite:elite||null, eliteNom, enraged:false, exploded:false, dot:null};
}
const CHAMPIONS={
  1:{nom:'Mâchefer le Brise-os', pvMul:0.55, atkMul:1.2, ability:'brise'},
  2:{nom:'Sève-Noire la Ronce', pvMul:0.62, atkMul:0.85, ability:'venin'},
  3:{nom:'le Charnier', pvMul:0.66, atkMul:0.9, ability:'meute'},
  4:{nom:'la Cendre-Reine', pvMul:0.72, atkMul:1.0, ability:'brasier'},
};
function buildEncounter(depth, kind){
  g.mons=[];
  if(kind==='boss'){
    const b=makeMon('behemoth',depth);
    if(depth<WAVES){ const act=Math.round(depth/10); const C=CHAMPIONS[act]||CHAMPIONS[1];
      b.pvMax=Math.round(b.pvMax*C.pvMul); b.pv=b.pvMax; b.atk=Math.round(b.atk*C.atkMul); b.nom=C.nom; b.champ=C.ability; }
    g.mons.push(b);
    const pool=monPool(depth);
    g.mons.push(makeMon(pick(pool),depth));
    g.mons.push(makeMon(pick(pool),depth));
    if(b.champ==='meute') g.mons.push(makeMon(pick(pool),depth));
    return;
  }
  const count = depth<=3?rint(1,2) : depth<=10?rint(2,3) : depth<=30?3 : rint(3,4);
  const pool=monPool(depth);
  for(let i=0;i<count;i++) g.mons.push(makeMon(pick(pool),depth));
  if(kind==='elite'){
    const idx=rint(0,g.mons.length-1);
    g.mons[idx]=makeMon(g.mons[idx].tmpl, depth, pick(Object.keys(MODIFIERS)));
    if(depth>=6 && g.mons.length>1){ const j=(idx+1)%g.mons.length; g.mons[j]=makeMon(g.mons[j].tmpl, depth, pick(Object.keys(MODIFIERS))); }
  }
}
function startCombat(depth, kind){
  g.depth=depth; g.combatKind=kind;
  buildEncounter(depth, kind);
  g.team.forEach(h=>{ h.cdA=0; h.cdB=0; h.poison=null; h.shield=0; h.vuln=0; });
  if(hasRelic('egide')){ const gw=g.team.find(h=>h.cls==='guerriere' && h.pv>0); if(gw) gw.shield=20; }
  { const ms=metaMods().shield; if(ms) g.team.forEach(h=>{ if(h.pv>0) h.shield=(h.shield||0)+ms; }); }
  g.team.forEach(h=>{ if(h.pv>0){ const ps=perkSum(h,'shield'); if(ps) h.shield=(h.shield||0)+ps; } });
  { const sa=g.team.reduce((m,h)=>Math.max(m,(h.pv>0?perkSum(h,'shieldAll'):0)),0); if(sa) g.team.forEach(h=>{ if(h.pv>0) h.shield=(h.shield||0)+sa; }); }
  if(hasRelic('serment_de_cendre')) g.team.forEach(h=>{ if(h.pv>0) h.shield=(h.shield||0)+16; });
  g.buffAtk=null; g.secondWind=false; g.elan=hasRelic('coeur_ardent')?2:0;
  ui.screen='combat'; ui.target=firstLivingMon(); ui._fx=[];
  beginRound();
  if(kind==='boss'){ try{ flashScreen('rgba(208,89,77,.32)'); shake(); sfx('lose'); }catch(e){} }
}
function beginRound(){
  if(!anyHeroAlive()){ gameOver(false); return; }
  if(!anyMonAlive()){ endCombat(); return; }
  g.queue=g.team.map((h,i)=>i).filter(i=>g.team[i].pv>0);
  g.cur=0;
  if(!monAlive(ui.target)) ui.target=firstLivingMon();
  decideIntents();
  render();
}
function curHeroIdx(){ return g.queue?g.queue[g.cur]:-1; }

function computeDmg(atk, def, magic, pen){ const base=atk*rand(.9,1.12); const f=magic?(pen?0.1:0.25):0.6; return Math.max(1,Math.round(base-def*f)); }
let _dealt=0;
function dmgMon(i,d){ const m=g.mons[i];
  if(hasRelic('braise_eternelle')) d=Math.round(d*1.15);
  { const p=metaMods().dmgPct; if(p) d=Math.round(d*(1+p/100)); }
  if(m.vuln>0) d=Math.round(d*1.3);
  m.pv-=d; if(m.pv<0)m.pv=0; if(m.pv===0){ sfx('death'); fx('mon-'+i,'','death'); if(g.stats) g.stats.kills++; gainElan(1); } _dealt+=d; fx('mon-'+i,'-'+d,'dmg'); return d; }
function checkDeaths(){
  g.mons.forEach((m,i)=>{ if(m.pv<=0 && m.tmpl==='pustule' && !m.exploded){ m.exploded=true;
    g.team.forEach((h,hi)=>{ if(h.pv>0) applyHeroDamage(h,hi,Math.round(m.atk*1.7)); });
    clog(`${m.nom} explose sur l’escouade !`);
  }});
}
function dmgToHeroVal(h,raw){ let d=raw;
  if(h.guard>0) d=Math.round(d*0.6);
  if(CLASSES[h.cls].pid==='cuirasse') d=Math.round(d*0.85);
  if(hasRelic('gardien_ancestral')) d=Math.round(d*0.9);
  { const mt=metaMods().dmgTaken; if(mt) d=Math.round(d*(1-mt)); }
  if(h.vuln>0) d=Math.round(d*1.3);
  return Math.max(1,d); }
function applyHeroDamage(h,hi,raw){
  let d=dmgToHeroVal(h,raw);
  if(h.shield>0){ const ab=Math.min(h.shield,d); h.shield-=ab; d-=ab; }
  if(d>0){ h.pv=Math.max(0,h.pv-d); fx('hero-'+hi,'-'+d,'dmg'); }
  else fx('hero-'+hi,'⛉','shield');
  if(h.pv<=0 && hasRelic('second_souffle') && !g.secondWind){ h.pv=1; g.secondWind=true; fx('hero-'+hi,'✦ survie','heal'); }
  return d; }
function lowestAlly(){ const liv=g.team.map((x,i)=>({x,i})).filter(o=>o.x.pv>0); if(!liv.length) return null;
  liv.sort((a,b)=>(a.x.pv/heroStats(a.x).pvMax)-(b.x.pv/heroStats(b.x).pvMax)); return liv[0]; }
function decideIntent(m,i){
  if(m.boss && !m.enraged && m.pv>0 && m.pv < m.pvMax*0.5){ m.enraged=true; m.atk=Math.round(m.atk*1.35); fx('mon-'+i,'FURIE','crit'); clog(`${m.nom} entre en furie !`); }
  if(m.heal){ const w=g.mons.some((x,j)=>j!==i && x.pv>0 && x.pv<x.pvMax); if(w){ m.intent={kind:'heal'}; return; } }
  if(m.tmpl==='totemiste'){ const a=g.mons.some(x=>x!==m && x.pv>0 && !x.enraged); if(a){ m.intent={kind:'buff'}; return; } }
  if(m.tmpl==='banshee' && chance(0.4) && g.team.some(h=>h.pv>0 && !(h.vuln>0))){ m.intent={kind:'wail'}; return; }
  if(m.tmpl==='necromancien' && g.mons.filter(x=>x.pv>0).length<4 && chance(0.45)){ m.intent={kind:'summon'}; return; }
  if(m.boss){ const enr=m.enraged;
    if(m.champ==='venin'){ m.intent=chance(0.45)?{kind:'venin'}:{kind:'attack'}; return; }
    if(m.champ==='meute'){ const canRally=g.mons.some(x=>x!==m && x.pv>0 && !x.enraged); m.intent=(canRally&&chance(0.45))?{kind:'rally'}:(chance(enr?0.45:0.28)?{kind:'aoe'}:{kind:'attack'}); return; }
    if(m.champ==='brasier'){ m.intent=chance(enr?0.65:0.45)?{kind:'aoe'}:{kind:'attack'}; return; }
    if(m.champ==='brise'){ m.intent={kind:'attack',big:true}; return; }
    m.intent=chance(enr?0.5:0.32)?{kind:'aoe'}:{kind:'attack'}; return; }
  m.intent={kind:'attack'};
}
function decideIntents(){ g.mons.forEach((m,i)=>{ if(m.pv>0) decideIntent(m,i); else m.intent=null; }); }
function previewHeroDmg(m, aoe){
  const liv=g.team.filter(h=>h.pv>0); if(!liv.length) return 0;
  const t=liv.slice().sort((a,b)=>a.pv-b.pv)[0];
  let d=computeDmg(aoe?Math.round(m.atk*0.7):m.atk, heroStats(t).def, m.magic);
  return dmgToHeroVal(t,d);
}

const ELAN_MAX=6;
function gainElan(n){ if(!g) return; g.elan=Math.min(ELAN_MAX,(g.elan||0)+n); }
function heroAction(act){
  const hi=curHeroIdx(); if(hi<0) return; const h=g.team[hi]; const c=CLASSES[h.cls];
  ui._fx=[]; _dealt=0; sfx('click');
  if(act==='attaque'){
    if(!monAlive(ui.target)) ui.target=firstLivingMon();
    const magic=c.dmg==='magie';
    let d=computeDmg(heroAtk(h), g.mons[ui.target].def, magic, h.cls==='mage');
    let crit=(c.pid==='coupfourre'?0.2:0)+(heroHasProp(h,'aiguise')?0.12:0)+(hasRelic('lame_affutee')?0.1:0)+metaMods().crit+perkSum(h,'crit');
    if(crit>0 && chance(crit)){ d=Math.round(d*1.8); fx('mon-'+ui.target,'CRIT','crit'); if(g.stats) g.stats.crits++; gainElan(1); }
    dmgMon(ui.target,d); clog(`${h.nom} attaque ${g.mons[ui.target].nom} · ${d}`);
    if(hasRelic('flamme_persistante') && monAlive(ui.target)) applyDot(g.mons[ui.target], Math.max(3,Math.round(heroAtk(h)*0.15)), 2);
    gainElan(1);
  } else if(act==='skillA'){
    if(h.cdA>0) return; castSkill(h,'A'); h.cdA=skillCdA(h); gainElan(1);
  } else if(act==='skillB'){
    if(!h.skillBunlocked || h.cdB>0) return; castSkill(h,'B'); h.cdB=skillCdB(h); gainElan(1);
  } else if(act==='potion'){
    if(g.inv.potions<=0) return; g.inv.potions--;
    const st=heroStats(h); const heal=healScale(Math.round(st.pvMax*(hasRelic('apothicaire')?0.75:0.5))); h.pv=Math.min(st.pvMax,h.pv+heal);
    fx('hero-'+hi,'+'+heal,'heal'); clog(`${h.nom} boit une potion · +${heal}`);
  } else if(act==='defense'){
    const st=heroStats(h); const sh=Math.round(st.def*1.6+8); h.shield=(h.shield||0)+sh; h.guard=1;
    fx('hero-'+hi,'⛉+'+sh,'shield'); clog(`${h.nom} se met en garde · +${sh} bouclier, dégâts du tour réduits`);
  } else if(act==='fureur'){
    if((g.elan||0)<3) return; g.elan-=3;
    if(!monAlive(ui.target)) ui.target=firstLivingMon();
    const magic=c.dmg==='magie';
    let d=computeDmg(Math.round(heroAtk(h)*2.4), g.mons[ui.target].def, magic, h.cls==='mage'); d=Math.round(d*1.8);
    fx('mon-'+ui.target,'FUREUR','crit'); flashScreen('rgba(224,145,63,.26)'); shake(); sfx('crit');
    dmgMon(ui.target,d); clog(`${h.nom} libère sa FUREUR ! · ${d}`);
    g.team.forEach(x=>{ if(x.pv>0) x.shield=(x.shield||0)+8; });
  } else return;

  let lifePct=(heroHasProp(h,'vampirique')?0.25:0)+(hasRelic('pacte_de_sang')?0.15:0)+perkSum(h,'lifesteal');
  if(_dealt>0 && lifePct>0){ const st=heroStats(h); const heal=Math.round(_dealt*lifePct); h.pv=Math.min(st.pvMax,h.pv+heal); if(heal>0) fx('hero-'+hi,'+'+heal,'heal'); }
  checkDeaths();
  if(!anyHeroAlive()){ render(); setTimeout(()=>gameOver(false),360); return; }
  if(!anyMonAlive()){ render(); setTimeout(endCombat,360); return; }
  advanceHero();
}
function applyDot(m, dmg, turns){ if(hasRelic('venin_concentre')) dmg=Math.round(dmg*1.5);
  if(m.dot){ m.dot.dmg+=dmg; m.dot.turns=Math.max(m.dot.turns,turns); m.dot.stacks=(m.dot.stacks||1)+1; }
  else { m.dot={dmg,turns,stacks:1}; } }
function castSkill(h, slot){
  const c=CLASSES[h.cls]; const sk=slot==='B'?c.skillB:c.skill;
  const healMul=1+perkSum(h,'healPct')/100;
  let lvl=(slot==='B'?h.skillBLvl:h.skillLvl)+(hasRelic('talisman_du_traqueur')?1:0)+(metaMods().skillLvl?1:0); const lm=1+0.35*(lvl-1);
  const atk=heroAtk(h); const pen=(h.cls==='mage');
  switch(sk.kind){
    case 'st_dmg':{
      if(!monAlive(ui.target)) ui.target=firstLivingMon();
      let d=Math.round(atk*sk.mult*lm);
      if(sk.crit && chance(sk.crit)){ d=Math.round(d*1.8); fx('mon-'+ui.target,'CRIT','crit'); gainElan(1); }
      if(!sk.ignoreDef) d=Math.max(1,d-Math.floor(g.mons[ui.target].def*(sk.magic?0.25:0.5)));
      dmgMon(ui.target,d);
      if(c.pid==='precision'){ const tm=g.mons[ui.target]; if(tm) tm.vuln=Math.max(tm.vuln||0,2); }
      clog(`${h.nom} — ${sk.nom} · ${d}`); break; }
    case 'aoe_dmg':{
      g.mons.forEach((m,i)=>{ if(m.pv>0){ let d=Math.round(atk*sk.mult*lm); d=Math.max(1,d-Math.floor(m.def*(sk.magic?(pen?0.1:0.25):0.5))); dmgMon(i,d); } });
      clog(`${h.nom} — ${sk.nom} frappe tous les ennemis`); break; }
    case 'heal':{
      const t=lowestAlly(); if(!t) break; const heal=healScale(Math.round(atk*sk.mult*lm*healMul)); const tm=heroStats(t.x).pvMax;
      t.x.pv=Math.min(tm,t.x.pv+heal); fx('hero-'+t.i,'+'+heal,'heal'); clog(`${h.nom} soigne ${t.x.nom} · +${heal}`); break; }
    case 'heal_all':{
      g.team.forEach((x,i)=>{ if(x.pv>0){ const tm=heroStats(x).pvMax; const heal=healScale(Math.round(atk*sk.mult*lm*healMul)); x.pv=Math.min(tm,x.pv+heal); fx('hero-'+i,'+'+heal,'heal'); } });
      clog(`${h.nom} — ${sk.nom} soigne toute l’escouade`); break; }
    case 'buff_atk':{
      g.buffAtk={pct:sk.pct,turns:sk.turns};
      g.team.forEach(x=>{ if(x.pv>0) x.shield=(x.shield||0)+8; });
      clog(`${h.nom} — ${sk.nom} · +${Math.round(sk.pct*100)}% ATQ & bouclier`); break; }
    case 'dot_all':{
      g.mons.forEach(m=>{ if(m.pv>0) applyDot(m, Math.round(atk*0.5*lm), sk.turns); });
      clog(`${h.nom} — ${sk.nom} embrase les ennemis`); break; }
    case 'dot_st':{
      if(!monAlive(ui.target)) ui.target=firstLivingMon();
      applyDot(g.mons[ui.target], Math.round(atk*0.6*lm), sk.turns);
      clog(`${h.nom} — ${sk.nom} empoisonne ${g.mons[ui.target].nom}`); break; }
  }
}
function advanceHero(){ g.cur++; if(g.cur>=g.queue.length) enemyPhase(); else render(); }

function resolveMon(m,i){
  const it=m.intent||{kind:'attack'};
  if(it.kind==='heal'){
    const others=g.mons.map((x,j)=>({x,j})).filter(o=>o.j!==i && o.x.pv>0 && o.x.pv<o.x.pvMax);
    if(others.length){ others.sort((a,b)=>a.x.pv-b.x.pv); const t=others[0]; const h=Math.round(m.atk*2.2);
      t.x.pv=Math.min(t.x.pvMax,t.x.pv+h); fx('mon-'+t.j,'+'+h,'heal'); clog(`${m.nom} régénère ${t.x.nom}`); return; }
  }
  if(it.kind==='buff'){
    const aIdx=g.mons.findIndex(x=>x!==m && x.pv>0 && !x.enraged);
    if(aIdx>=0){ const a=g.mons[aIdx]; a.enraged=true; a.atk=Math.round(a.atk*1.25); fx('mon-'+aIdx,'▲','crit'); clog(`${m.nom} enrage ${a.nom}`); return; }
  }
  if(it.kind==='aoe'){
    g.team.forEach((h,hi)=>{ if(h.pv>0){ let d=computeDmg(Math.round(m.atk*0.7),heroStats(h).def,m.magic); applyHeroDamage(h,hi,d); } });
    shake(); flashScreen('rgba(208,89,77,.18)'); clog(`${m.nom} déchaîne une attaque de zone !`); return;
  }
  if(it.kind==='venin'){
    const liv0=g.team.map((h,hi)=>({h,hi})).filter(o=>o.h.pv>0); if(!liv0.length) return;
    liv0.sort((a,b)=>a.h.pv-b.h.pv); const tt=liv0[0];
    let dd=computeDmg(Math.round(m.atk*0.6),heroStats(tt.h).def,true); applyHeroDamage(tt.h,tt.hi,dd);
    if(tt.h.pv>0) tt.h.poison={dmg:Math.round(m.atk*0.5),turns:3};
    clog(`${m.nom} inocule un venin à ${tt.h.nom} !`); return;
  }
  if(it.kind==='rally'){
    const aIdx=g.mons.findIndex(x=>x!==m && x.pv>0 && !x.enraged);
    if(aIdx>=0){ const a=g.mons[aIdx]; a.enraged=true; a.atk=Math.round(a.atk*1.3); fx('mon-'+aIdx,'▲','crit'); clog(`${m.nom} galvanise ${a.nom} !`); return; }
  }
  if(it.kind==='wail'){
    const l0=g.team.map((h,hi)=>({h,hi})).filter(o=>o.h.pv>0); if(!l0.length) return;
    l0.sort((a,b)=>a.h.pv-b.h.pv); const tt=l0[0]; tt.h.vuln=Math.max(tt.h.vuln||0,2);
    const dd=computeDmg(Math.round(m.atk*0.5),heroStats(tt.h).def,true); applyHeroDamage(tt.h,tt.hi,dd);
    fx('hero-'+tt.hi,'⤓','crit'); clog(`${m.nom} hurle — ${tt.h.nom} devient vulnérable !`); return;
  }
  if(it.kind==='summon'){
    if(g.mons.length<6){ const nm=makeMon(pick(['loup','gobelin','vipere']),g.depth||5); g.mons.push(nm); clog(`${m.nom} relève un servant !`); return; }
  }
  const liv=g.team.map((h,hi)=>({h,hi})).filter(o=>o.h.pv>0);
  if(!liv.length) return;
  liv.sort((a,b)=>a.h.pv-b.h.pv);
  const taunters=liv.filter(o=>perkSum(o.h,'taunt')>0);
  const t=taunters.length?taunters[0]:liv[0];
  let d=computeDmg(m.atk,heroStats(t.h).def,m.magic); if(it.big) d=Math.round(d*1.4);
  const lost=applyHeroDamage(t.h,t.hi,d); clog(`${m.nom} blesse ${t.h.nom} · ${lost}`);
  const th=perkSum(t.h,'thorns'); if(th>0 && lost>0 && m.pv>0){ const r=Math.max(1,Math.round(lost*th)); m.pv=Math.max(0,m.pv-r); fx('mon-'+i,'-'+r,'dmg'); }
  if(m.tmpl==='veuve' && t.h.pv>0) t.h.poison={dmg:Math.round(m.atk*0.4),turns:3};
  if(m.elite==='vorace' && lost>0){ const steal=Math.round(lost*0.5); m.pv=Math.min(m.pvMax,m.pv+steal); fx('mon-'+i,'+'+steal,'heal'); }
}
function tickStatuses(){
  g.team.forEach((h,hi)=>{ if(h.pv>0 && h.poison && h.poison.turns>0){ const d=h.poison.dmg; h.pv=Math.max(0,h.pv-d); fx('hero-'+hi,'-'+d,'dmg'); h.poison.turns--; if(h.poison.turns<=0) h.poison=null; } });
  g.mons.forEach((m,i)=>{ if(m.pv>0 && m.dot && m.dot.turns>0){ const d=m.dot.dmg; m.pv=Math.max(0,m.pv-d); fx('mon-'+i,'-'+d,'dmg'); m.dot.turns--; if(m.dot.turns<=0) m.dot=null; }
    if(m.vuln>0) m.vuln--; });
  g.team.forEach(h=>{ if(h.vuln>0) h.vuln--; });
  g.team.forEach(h=>{ if(h.guard>0) h.guard--; });
  if(g.buffAtk){ g.buffAtk.turns--; if(g.buffAtk.turns<=0) g.buffAtk=null; }
  if(hasRelic('rempart_mobile')) g.team.forEach((h,hi)=>{ if(h.pv>0) h.shield=(h.shield||0)+6; });
  if(hasRelic('regen_meute')) g.team.forEach((h,hi)=>{ if(h.pv>0){ const tm=heroStats(h).pvMax; if(h.pv<tm){ h.pv=Math.min(tm,h.pv+4); fx('hero-'+hi,'+4','heal'); } } });
  { const rg=metaMods().regen; if(rg) g.team.forEach((h,hi)=>{ if(h.pv>0){ const tm=heroStats(h).pvMax; if(h.pv<tm){ h.pv=Math.min(tm,h.pv+rg); fx('hero-'+hi,'+'+rg,'heal'); } } }); }
  const sg=g.team.find(h=>h.pv>0 && CLASSES[h.cls].pid==='grace');
  if(sg){ const t=lowestAlly(); if(t){ const tm=heroStats(t.x).pvMax; if(t.x.pv<tm){ const heal=Math.round(heroStats(sg).atk*0.6*(1+perkSum(sg,'healPct')/100)); t.x.pv=Math.min(tm,t.x.pv+heal); if(heal>0) fx('hero-'+t.i,'+'+heal,'heal'); } } }
}
function enemyPhase(){
  ui._fx=[];
  g.mons.forEach((m,i)=>{ if(m.pv>0){ resolveMon(m,i); if(m.elite==='veloce' && m.intent && m.intent.kind==='attack' && m.pv>0 && anyHeroAlive()) resolveMon(m,i); } });
  tickStatuses();
  checkDeaths();
  g.team.forEach(h=>{ if(h.cdA>0) h.cdA--; if(h.cdB>0) h.cdB--; });
  render();
  if(!anyHeroAlive()){ setTimeout(()=>gameOver(false),380); return; }
  if(!anyMonAlive()){ setTimeout(endCombat,360); return; }
  setTimeout(beginRound,260);
}

let _ending=false;
function endCombat(){
  if(_ending) return; _ending=true;
  const depth=g.depth;
  const loot=rollLoot(g.mons.slice(),depth);
  if(g.combatKind==='elite') loot.gear.push(genGear(upTier(rollRarity(depth,false)),depth));
  if(g.combatKind==='boss'){ loot.gear.push(genGear('épique',depth)); loot.gear.push(genGear(chance(0.5)?'légendaire':'épique',depth)); }
  if(hasRelic('oeil_du_corbeau')) loot.gear.push(genGear(rollRarity(depth,false),depth));
  let gold=rint(4,7)+Math.round(depth*1.6);
  if(g.combatKind==='elite') gold+=8+depth;
  if(g.combatKind==='boss') gold+=(depth>=WAVES?90:35+depth);
  gold=Math.round(gold*(1+(metaMods().goldPct||0)/100));
  if(hasRelic('collecteur')) gold=Math.round(gold*1.25);
  if(g.stats) g.stats.gold+=gold;
  loot.gold=gold;
  applyLoot(loot); g.lastLoot=lootSummary(loot);
  _ending=false;
  if(g.combatKind==='boss' && g.depth>=WAVES){ completeNode(); }
  else { ui.screen='loot'; render(); }
}
function gameOver(win){
  const reached=win?BOSS_WAVE:(g.depthReached||1);
  const earned=Math.round(trophiesFor(reached,win)*(1+(meta.peril||0)*0.3)); meta.trophies=(meta.trophies||0)+earned;
  meta.best=Math.max(meta.best||0,reached); ui.perilUp=false;
  if(win){ meta.wins=(meta.wins||0)+1; if((meta.peril||0)>=(meta.perilMax||0) && (meta.perilMax||0)<8){ meta.perilMax=(meta.perilMax||0)+1; ui.perilUp=true; } }
  if(g&&g.stats) meta.kills=(meta.kills||0)+(g.stats.kills||0);
  const newU=checkUnlocks(); ui.unlocked=newU.map(u=>u.nom);
  save(); sfx(win?'win':'lose');
  ui.summary=(g&&g.stats)?{kills:g.stats.kills,gold:g.stats.gold,crits:g.stats.crits,relics:(g.relics||[]).length,peril:meta.peril||0}:null; ui.seed=(g&&g.seed)?g.seed:null;
  clearRun();
  ui.screen='over'; ui.win=win; ui.finalWave=reached; ui.earned=earned; render();
}

/* ============================================================ CAMP ACTIONS */
function canAfford(cost){ for(const k in cost){ if((g.inv.mats[k]||0)<cost[k]) return false; } return true; }
function spend(cost){ for(const k in cost) g.inv.mats[k]-=cost[k]; }
function costStr(cost){ return Object.keys(cost).map(k=>`${cost[k]} ${MAT_LABEL[k]}`).join(', '); }
function upTier(r){ return RARITIES[Math.min(RARITIES.length-1,RARITIES.indexOf(r)+1)]; }

function equip(itemId,heroIdx){
  const idx=g.inv.gear.findIndex(x=>x.id===itemId); if(idx<0) return;
  const it=g.inv.gear[idx], h=g.team[heroIdx], sl=it.slot;
  g.inv.gear.splice(idx,1);
  const old=h.gear[sl]; h.gear[sl]=it; if(old) g.inv.gear.push(old);
  const mx=heroStats(h).pvMax; if(h.pv>mx) h.pv=mx;
  sfx('block'); toast(`${it.nom} équipé sur ${h.nom}.`); render();
}
function unequip(heroIdx,sl){
  const h=g.team[heroIdx], it=h.gear[sl]; if(!it) return;
  h.gear[sl]=null; g.inv.gear.push(it);
  const mx=heroStats(h).pvMax; if(h.pv>mx) h.pv=mx; render();
}
function craft(id){
  const r=RECIPES.find(x=>x.id===id); if(!r||!canAfford(r.cost)) return; spend(r.cost);
  if(r.kind==='gear'){ const cd=Math.max(1,g.depthReached||1); let rar=rollRarity(cd,false); if(chance(0.25)) rar=upTier(rar); const it=genGear(rar,cd,r.slot); g.inv.gear.push(it); toast(`Fabriqué : ${it.nom} (${it.rarity}).`); }
  else { g.inv.potions++; toast('Potion fabriquée.'); }
  render();
}
function upgradeSkillA(i){ const h=g.team[i]; if(h.skillLvl>=3) return; const c=skillUpCost(h.skillLvl); if(!canAfford(c)) return; spend(c); h.skillLvl++; toast(`${CLASSES[h.cls].skill.nom} amélioré (niv.${h.skillLvl}).`); render(); }
function upgradeSkillB(i){ const h=g.team[i]; if(!h.skillBunlocked||h.skillBLvl>=3) return; const c=skillUpCost(h.skillBLvl); if(!canAfford(c)) return; spend(c); h.skillBLvl++; toast(`${CLASSES[h.cls].skillB.nom} amélioré (niv.${h.skillBLvl}).`); render(); }
function unlockSkillB(i){ const h=g.team[i]; if(h.skillBunlocked||!canAfford(SKILLB_COST)) return; spend(SKILLB_COST); h.skillBunlocked=true; toast(`${CLASSES[h.cls].skillB.nom} débloquée !`); render(); }
function revive(i){ const h=g.team[i]; if(h.pv>0||!canAfford(REVIVE_COST)) return; spend(REVIVE_COST); h.pv=Math.round(heroStats(h).pvMax*0.5); toast(`${h.nom} ranimé.`); render(); }
function rest(){ if(g.restedThisCamp) return; g.team.forEach(h=>{ if(h.pv>0){ const mx=heroStats(h).pvMax; h.pv=Math.min(mx,h.pv+Math.round(mx*0.25)); } }); g.restedThisCamp=true; toast('L’escouade se repose.'); render(); }

/* ---------- rencontres (événements / repos / trésor) ---------- */
function eGainMat(k,n){ g.inv.mats[k]=(g.inv.mats[k]||0)+n; return `+${n} ${MAT_LABEL[k]}`; }
function eGiveGear(rarity,depth){ const it=genGear(rarity,depth); g.inv.gear.push(it); return `${it.nom} (${it.rarity})`; }
function eHealTeam(pct){ g.team.forEach(h=>{ if(h.pv>0){ const mx=heroStats(h).pvMax; h.pv=Math.min(mx,h.pv+Math.round(mx*pct)); } }); return `l’escouade récupère ${Math.round(pct*100)}% de PV`; }
function eDamageRandom(amt){ const liv=g.team.filter(h=>h.pv>0); if(!liv.length) return ''; const h=pick(liv); h.pv=Math.max(1,h.pv-amt); return `${h.nom} subit ${amt}`; }
function eUpgradeRandomSkill(){
  const cand=g.team.filter(h=>h.skillLvl<3 || (h.skillBunlocked&&h.skillBLvl<3));
  if(!cand.length) return 'mais nul n’a plus rien à apprendre';
  const h=pick(cand);
  if(h.skillLvl<3 && (!h.skillBunlocked || chance(0.5))){ h.skillLvl++; return `${h.nom} : ${CLASSES[h.cls].skill.nom} niv.${h.skillLvl}`; }
  h.skillBLvl++; return `${h.nom} : ${CLASSES[h.cls].skillB.nom} niv.${h.skillBLvl}`;
}
function plainStats(it){ const o=it.stats; const p=[]; if(o.atk)p.push(`+${o.atk} ATQ`); if(o.def)p.push(`+${o.def} DEF`); if(o.pvMax)p.push(`+${o.pvMax} PV`); if(o.vit)p.push(`+${o.vit} VIT`); return p.join(' '); }
function openEncounter(enc){ enc.resolved=false; enc.result=''; g.enc=enc; ui.screen='encounter'; render(); }
function openRest(){
  openEncounter({icon:'✚',title:'Feu de camp',text:'La meute s’arrête. Les braises crépitent — un répit avant de descendre plus loin.',
    options:[
      {label:'Panser les blessures', sub:'+40% PV à l’escouade', run(e){ e.result=eHealTeam(0.4)+'.'; e.resolved=true; }},
      {label:'Affûter près du feu', sub:'Améliore une compétence', run(e){ e.result='L’entraînement paie — '+eUpgradeRandomSkill()+'.'; e.resolved=true; }},
    ]});
}
function gearOption(it, mat){ return {label:gearName(it), sub:`${it.rarity} · ${plainStats(it)}${it.prop?' · '+PROP_LABEL[it.prop]:''} · ${deltaVerdict(it)}`, run(e){ g.inv.gear.push(it); eGainMat(mat,3); e.result=`Tu choisis ${gearName(it)}, plus 3 ${MAT_LABEL[mat]}.`; e.resolved=true; }}; }
function relicOption(){ const r=pick(availRelics()); return {label:`${r.ic} ${r.nom}`, sub:`Artefact — ${r.desc}`, run(e){ addRelic(r.id); e.result=`Tu scelles un artefact : ${r.nom}.`; e.resolved=true; }}; }
function openTreasure(depth){
  const mat=pick(MATS);
  const opts=[ gearOption(genGear(rollRarity(depth+2,false),depth), mat) ];
  if(chance(0.5) && relicsLeft()) opts.push(relicOption());
  else opts.push(gearOption(genGear(rollRarity(depth+2,false),depth), mat));

    <button class="btn2" id="sfx-toggle">Son ${meta.sfx===false?'🔇 Off':'🔊 On'}</button>
    ${meta.best?`<p class="rec">Record : vague ${meta.best} · ${meta.wins||0} victoire(s) · ${meta.runs||0} battue(s)</p>`:''}
    <details class="how"><summary>Comment jouer</summary><div>
      <b>Combat au tour par tour.</b> Chaque chasseur agit une fois par round : <b>Attaque</b>, ses <b>compétences</b> (avec un délai de recharge), ou une <b>potion</b>. Touche un monstre pour le cibler.<br><br>
      <b>La carte.</b> Trace ta route jusqu’au <b>Béhémoth</b> en choisissant tes étapes : <b>Combat</b>, <b>Élite</b> (plus dur, meilleur butin), <b>Marché</b> (achète et revends), <b>Mystère</b> (rencontres à choix), <b>Repos</b> (feu de camp) et <b>Trésor</b>. La voie ne se remonte pas — chaque choix compte.<br><br>
      <b>Passifs, talents & spécialisations.</b> Chacun a un passif permanent et deux compétences (la 2ᵉ se débloque au camp). L’onglet <b>Talents</b> permet aussi d’apprendre une <b>spécialisation</b> par chasseur — dégâts, critique, soins renforcés, bouclier, provocation, représailles… — qui transforme son rôle. Dans le <b>Sac</b>, clique un équipement pour l’équiper d’un coup sur le chasseur idéal.<br><br>
      <b>Le camp</b> (accessible depuis la carte) sert à équiper le <b>butin</b>, fabriquer à l’<b>Atelier</b>, améliorer les <b>compétences</b> et ranimer les blessés. Les PV ne remontent pas seuls : compte sur les <b>Repos</b>, les potions, la Soigneuse et certaines rencontres.<br><br>
      <b>Élites & dangers.</b> Un monstre d’<b>élite</b> (enragé, blindé, véloce ou vorace) garde un butin supérieur. Méfie-toi des <b>Pustules</b> qui explosent en mourant et des <b>Veuves</b> qui empoisonnent. L’équipement rare peut porter une <b>propriété</b> (vol de vie, critique, recharge accélérée).<br><br>
<b>Lis le terrain.</b> Sur chaque monstre, l’<b>intention</b> (⚔ dégâts, ✚ soin, ▲ rage, ✸ zone) annonce son prochain coup ; sous tes actions, l’aperçu <span class="k">~chiffre</span> indique les dégâts ou soins attendus.<br><br>
      <b>Or & forge.</b> Combats et reventes rapportent de l’<span class="k">Or ⊙</span> : dépense-le au marché pour acheter, ou à la <b>Forge</b> du camp pour renforcer tes équipements (jusqu’à +3). Au camp, chaque pièce indique si elle <span class="k">▲ améliore</span> ou <span class="k">▼ diminue</span> le chasseur.<br><br>
      <b>Défense & péril.</b> L’action <b>Défendre</b> donne un bouclier et réduit les dégâts du tour — idéale face à une <b>attaque de zone</b> annoncée. Après ta première victoire, monte le <b>Péril</b> au menu : ennemis plus coriaces, mais davantage de Trophées. Sur mobile, <b>touche une relique ou une spécialisation</b> pour voir sa description.<br><br>

function viewMap(){
  const R=g.map.R, rows=g.map.rows;
  const focus = g.pos.row>=0 ? {r:g.pos.row,i:g.pos.node} : {r:0,i:0};
  const curDepth = g.pos.row>=0 ? g.pos.row+1 : 0; const REVEAL=2;
  let rowsHtml='';
  for(let dr=0; dr<R; dr++){
    const r=R-1-dr; const depth=r+1;
    const cells=[0,1,2].map(slot=>{
      const i=rows[r].findIndex(n=>n.slot===slot);
      if(i<0) return `<div class="mnode empty"></div>`;
      const n=rows[r][i]; const st=nodeState(r,i);
      const cls=st==='reach'?'reach':st==='current'?'current':st==='visited'?'visited':'lock';
      const isFocus=(r===focus.r && i===focus.i);
      const known = n.visited || st==='reach' || st==='current' || depth<=curDepth+REVEAL || depth%10===0 || depth%10===9;
      if(!known) return `<button class="mnode fog" disabled><span class="mn-ic mn-fog">?</span><span class="mn-lb">···</span></button>`;
      const md=NODE[n.type];
      return `<button class="mnode ${cls} t-${n.type}" ${isFocus?'id="map-here"':''} ${st==='reach'?`data-node="${r}:${i}"`:'disabled'}>
        <span class="mn-ic">${nodeSvg(n.type)}</span><span class="mn-lb">${md.label}</span></button>`;
    }).join('');
    if(depth%10===0) rowsHtml+=`<div class="map-act ${depth>=WAVES?'final':''}">Acte ${depth/10} — ${depth>=WAVES?'le Béhémoth':(CHAMPIONS[depth/10]?CHAMPIONS[depth/10].nom:'Champion')}</div>`;
    rowsHtml+=`<div class="mrow">${cells}</div>`;
  }
  let _lines='';
  for(let r=0;r<R-1;r++){
    const cur=rows[r], nxt=rows[r+1];
    cur.forEach((a,ai)=>{ const yA=(R-1-r)+0.5, xA=a.slot+0.5;
      a.next.forEach(ti=>{ const b=nxt[ti]; if(!b) return; const xB=b.slot+0.5, yB=(R-2-r)+0.5;
        let cls='idle'; if(r===g.pos.row && ai===g.pos.node) cls='live'; else if(a.visited && b.visited) cls='done';
        _lines+=`<line x1="${xA}" y1="${yA}" x2="${xB}" y2="${yB}" class="${cls}"/>`; });
    });
  }
  const edgesSvg=`<svg class="medges" viewBox="0 0 3 ${R}" preserveAspectRatio="none" aria-hidden="true">${_lines}</svg>`;
  const banner=g.lastLoot?`<div class="loot"><div class="loot-h">Butin récolté</div>${g.lastLoot}</div>`:'';
  const hint=g.pos.row<0?'Choisis ton point de départ.':'Choisis ta prochaine étape — la voie ne se remonte pas.';
  return `${topBar(`Acte ${Math.ceil(Math.max(1,g.pos.row+1)/10)}/5 · ${Math.max(0,g.pos.row+1)}/${WAVES}`)}
    ${partyStrip()}
    ${relicBar()}
    ${banner}
    <div class="map-hint">${hint}</div>
    <div class="mapwrap">${edgesSvg}${rowsHtml}</div>
    ${hubNav()}`;
}

  else if(ui.screen==='shop') c='--gold';
  else if(ui.screen==='loot') c='--heal';
  else if(ui.screen==='lair') c='--amethyst';
  else if(ui.screen==='codex'||ui.screen==='encounter') c='--steel';
  else if(ui.screen==='camp') c = (ui.tab==='equipe'?'--steel':ui.tab==='talents'?'--amethyst':ui.tab==='sac'?'--gold':'--ember');
  return { c:'var('+c+')', s:'var('+c+'-soft)' };
}
function render(){
  initAmbiance();
  const app=$('app'); if(!app) return;
  let html='';
  if(ui.screen==='title') html=viewTitle();
  else if(ui.screen==='codex') html=viewCodex();
  else if(ui.screen==='choose') html=viewChoose();
  else if(ui.screen==='map') html=viewMap();
  else if(ui.screen==='encounter') html=viewEncounter();
  else if(ui.screen==='shop') html=viewShop();
  else if(ui.screen==='combat') html=viewCombat();
  else if(ui.screen==='loot') html=viewLoot();
  else if(ui.screen==='camp') html=viewCamp();
  else if(ui.screen==='lair') html=viewLair();
  else if(ui.screen==='over') html=viewOver();
  { const a=screenAccent(); try{ const r=document.documentElement.style; r.setProperty('--accent', a.c); r.setProperty('--accent-soft', a.s); }catch(e){} }
  app.innerHTML=html + inspectSheet();
  { const key=ui.screen+'|'+(ui.tab||''); if(ui._lastKey!==key){ ui._lastKey=key; try{ app.classList.remove('fadein'); void app.offsetWidth; app.classList.add('fadein'); }catch(e){} } }
  bind();
  flushFx();
}
function bindEach(sel,fn){ document.querySelectorAll(sel).forEach(el=>el.onclick=()=>fn(el)); }
function bind(){
  document.querySelectorAll('[data-inspect]').forEach(el=>{ el.onclick=(e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); openInspect(el.dataset.inspect); }; });
  bindEach('[data-inspect-close]',el=>{ ui.inspect=null; render(); });
  bindEach('[data-hub]',el=>{ const d=el.dataset.hub; if(d==='map'){ ui.screen='map'; } else { ui.screen='camp'; ui.tab=d; } try{window.scrollTo(0,0);}catch(e){} render(); });
  if(ui.screen==='title'){
    const b=$('start'); if(b) b.onclick=()=>{ ui.pendingSeed=null; ui.screen='choose'; render(); };
    const dl=$('daily'); if(dl) dl.onclick=()=>{ ui.pendingSeed='jour-'+new Date().toISOString().slice(0,10); ui.screen='choose'; render(); };
    const cx=$('codex'); if(cx) cx.onclick=()=>{ ui.screen='codex'; ui.codexTab='chasseurs'; render(); };
    const lr=$('lair'); if(lr) lr.onclick=()=>{ ui.screen='lair'; render(); };
    const rs=$('resume'); if(rs) rs.onclick=()=>resumeRun();
    bindEach('[data-peril]',el=>{ meta.peril=+el.dataset.peril; save(); render(); });
    const st=$('sfx-toggle'); if(st) st.onclick=()=>{ meta.sfx=(meta.sfx===false); save(); if(meta.sfx!==false) sfx('click'); render(); };
  }
  else if(ui.screen==='codex'){
    bindEach('[data-ctab]',el=>{ ui.codexTab=el.dataset.ctab; render(); });
    const bk=$('cx-back'); if(bk) bk.onclick=()=>{ ui.screen='title'; render(); };
  }
  else if(ui.screen==='choose'){ bindEach('[data-pick]',el=>newRun(el.dataset.pick, ui.pendingSeed||null)); }
  else if(ui.screen==='map'){
    bindEach('[data-node]',el=>{ const [r,i]=el.dataset.node.split(':'); chooseNode(+r,+i); });
    const oc=$('open-camp'); if(oc) oc.onclick=()=>{ ui.screen='camp'; render(); };
    const here=$('map-here'); if(here && here.scrollIntoView){ try{ here.scrollIntoView({block:'center'}); }catch(e){} }
  }
  else if(ui.screen==='encounter'){
    bindEach('[data-opt]',el=>encChoose(+el.dataset.opt));
    const ct=$('enc-cont'); if(ct) ct.onclick=()=>completeNode();
  }
  else if(ui.screen==='shop'){
    bindEach('[data-buy]',el=>buyGear(+el.dataset.buy));
    bindEach('[data-sell]',el=>sellGear(+el.dataset.sell));
    bindEach('[data-upg]',el=>upgradeGear(+el.dataset.upg));
    const bp=$('buy-potion'); if(bp) bp.onclick=()=>buyPotion();
    const br=$('buy-relic'); if(br) br.onclick=()=>buyRelicShop();
    const lv=$('shop-leave'); if(lv) lv.onclick=()=>completeNode();
  }
  else if(ui.screen==='loot'){
    bindEach('[data-equipbest]',el=>equipBest(+el.dataset.equipbest));
    bindEach('[data-equip]',el=>{ const [id,hi]=el.dataset.equip.split(':'); equip(+id,+hi); });
    bindEach('[data-sell]',el=>sellGear(+el.dataset.sell));
    bindEach('[data-craft]',el=>craft(el.dataset.craft));
    bindEach('[data-upg]',el=>upgradeGear(+el.dataset.upg));
    const c=$('loot-cont'); if(c) c.onclick=()=>{ g.lastLoot=null; completeNode(); };
  }
  else if(ui.screen==='combat'){
    bindEach('[data-mon]',el=>{ const i=+el.dataset.mon; if(monAlive(i)){ ui.target=i; render(); } });
    bindEach('[data-act]',el=>heroAction(el.dataset.act));
  }
  else if(ui.screen==='camp'){
    bindEach('[data-tab]',el=>{ ui.tab=el.dataset.tab; render(); });
    const mb=$('map-back'); if(mb) mb.onclick=()=>{ ui.screen='map'; render(); };
    bindEach('[data-equip]',el=>{ const [id,hi]=el.dataset.equip.split(':'); equip(+id,+hi); });
    bindEach('[data-unequip]',el=>{ const [hi,sl]=el.dataset.unequip.split(':'); unequip(+hi,sl); });
    bindEach('[data-upa]',el=>upgradeSkillA(+el.dataset.upa));
    bindEach('[data-upb]',el=>upgradeSkillB(+el.dataset.upb));
    bindEach('[data-unlockb]',el=>unlockSkillB(+el.dataset.unlockb));
    bindEach('[data-revive]',el=>revive(+el.dataset.revive));
    bindEach('[data-craft]',el=>craft(el.dataset.craft));
    bindEach('[data-upg]',el=>upgradeGear(+el.dataset.upg));
    bindEach('[data-equipbest]',el=>equipBest(+el.dataset.equipbest));
    bindEach('[data-perk]',el=>{ const [i,id]=el.dataset.perk.split(':'); buyPerk(+i,id); });
  }
  else if(ui.screen==='lair'){
    bindEach('[data-buy]',el=>buyMeta(el.dataset.buy));
    const sc=$('save-copy'); if(sc) sc.onclick=()=>{ const o=$('save-out'); if(!o) return; try{ o.focus(); o.select&&o.select(); }catch(e){}
      const done=()=>toast('Sauvegarde copiée.'); if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(o.value).then(done).catch(()=>{ try{document.execCommand('copy');}catch(_){} done(); }); } else { try{document.execCommand('copy');}catch(_){} done(); } };
    const si=$('save-import'); if(si) si.onclick=()=>{ const f=$('save-in'); const v=(f&&f.value||'').trim(); if(!v){ toast('Colle d’abord un code.'); return; } if(importSave(v)){ toast('Progression restaurée !'); render(); } else toast('Code de sauvegarde invalide.'); };
    const bk=$('lair-back'); if(bk) bk.onclick=()=>{ ui.screen='title'; render(); };
  }
  else if(ui.screen==='over'){
    if(ui.win) try{ confetti(); }catch(e){}
    const b=$('again'); if(b) b.onclick=()=>{ ui.screen='title'; render(); };
    const tl=$('to-lair'); if(tl) tl.onclick=()=>{ ui.screen='lair'; render(); };
  }
}
function flushFx(){
  const layer=$('fxlayer'); if(!layer) return;
  (ui._fx||[]).forEach(f=>{
    const el=$(f.targetId); if(!el||!el.getBoundingClientRect) return;
    const rc = f.cls==='heal'?'u-heal' : f.cls==='shield'?'u-block' : (f.cls==='dmg'||f.cls==='crit')?'u-hit' : '';
    if(rc){ el.classList.remove(rc); void el.offsetWidth; el.classList.add(rc); setTimeout(()=>el.classList.remove(rc),440); }
    if(f.cls==='death') burstAt(el,'var(--blood)',16);
    else if(f.cls==='crit'){ burstAt(el,'var(--gold)',14); ringAt(el,'rgba(217,178,91,.9)'); flashScreen('rgba(224,145,63,.18)'); }
    else if(f.cls==='dmg') ringAt(el,'rgba(208,89,77,.75)');
    else if(f.cls==='heal') ringAt(el,'rgba(116,173,111,.75)');
    else if(f.cls==='shield') ringAt(el,'rgba(111,155,196,.8)');
    if(f.txt){ const r=el.getBoundingClientRect(); const s=document.createElement('span'); s.className='float '+(f.cls||''); s.textContent=f.txt; s.style.left=(r.left+r.width/2)+'px'; s.style.top=(r.top+6)+'px'; layer.appendChild(s); setTimeout(()=>{ if(s.remove) s.remove(); },1000); }
  });
  ui._fx=[];
}
let _ac=null;
function audio(){ if(_ac) return _ac; try{ _ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ _ac=null; } return _ac; }
function sfx(type){ if(meta.sfx===false) return; const ac=audio(); if(!ac) return; try{
  const t=ac.currentTime, o=ac.createOscillator(), g2=ac.createGain(); o.connect(g2); g2.connect(ac.destination);
  const TB={hit:[170,0.08,'square'],crit:[150,0.16,'sawtooth'],heal:[540,0.16,'sine'],block:[300,0.12,'triangle'],death:[90,0.22,'sawtooth'],coin:[880,0.1,'square'],click:[430,0.035,'square'],win:[0,0.55,'triangle'],lose:[120,0.6,'sawtooth']};
  const a=TB[type]||TB.click; const f=a[0], d=a[1]; o.type=a[2];
  if(type==='win'){ o.frequency.setValueAtTime(523,t); o.frequency.setValueAtTime(659,t+0.15); o.frequency.setValueAtTime(784,t+0.3); }
  else { o.frequency.setValueAtTime(f,t); if(type==='crit'||type==='death'||type==='lose') o.frequency.exponentialRampToValueAtTime(Math.max(40,f*0.5),t+d); }
  g2.gain.setValueAtTime(0.0001,t); g2.gain.exponentialRampToValueAtTime(type==='click'?0.05:0.14,t+0.012); g2.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.start(t); o.stop(t+d+0.03);
}catch(e){} }
function shake(){ try{ if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches) return; const w=document.querySelector('.wrap'); if(!w) return; w.classList.remove('shake'); void w.offsetWidth; w.classList.add('shake'); setTimeout(()=>{ if(w) w.classList.remove('shake'); },360); }catch(e){} }
function _raf(fn){ try{ (window.requestAnimationFrame||function(f){return setTimeout(f,16);})(fn); }catch(e){} }
function burstAt(el,color,n){ try{ const layer=$('fxlayer'); if(!layer||!el||!el.getBoundingClientRect) return; const r=el.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2;
  for(let k=0;k<n;k++){ const p=document.createElement('span'); p.className='vfx-p'; const ang=Math.random()*6.283, dist=16+Math.random()*46, sz=3+Math.random()*4;
    p.style.left=cx+'px'; p.style.top=cy+'px'; p.style.width=p.style.height=sz.toFixed(1)+'px'; p.style.background=color;
    layer.appendChild(p); const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist-12;
    _raf(()=>{ p.style.transform='translate('+dx.toFixed(0)+'px,'+dy.toFixed(0)+'px) scale(0)'; p.style.opacity='0'; });
    setTimeout(()=>{ if(p.remove) p.remove(); },560); } }catch(e){} }
function ringAt(el,color){ try{ const layer=$('fxlayer'); if(!layer||!el||!el.getBoundingClientRect) return; const r=el.getBoundingClientRect(); const ring=document.createElement('span'); ring.className='vfx-ring'; ring.style.left=(r.left+r.width/2)+'px'; ring.style.top=(r.top+r.height/2)+'px'; ring.style.borderColor=color; layer.appendChild(ring); _raf(()=>{ ring.style.transform='translate(-50%,-50%) scale(2.4)'; ring.style.opacity='0'; }); setTimeout(()=>{ if(ring.remove) ring.remove(); },440); }catch(e){} }
function flashScreen(color){ try{ const f=$('flash'); if(!f) return; f.style.background=color; f.style.opacity='1'; _raf(()=>{ f.style.opacity='0'; }); }catch(e){} }
function confetti(){ try{ const layer=$('fxlayer'); if(!layer) return; const W=(window.innerWidth||400); const cols=['#e0913f','#d9b25b','#ffd9a0','#d0594d','#a982cf'];
  for(let k=0;k<48;k++){ const p=document.createElement('span'); p.className='vfx-c'; const sz=4+Math.random()*5;
    p.style.left=(Math.random()*W)+'px'; p.style.top='-14px'; p.style.width=p.style.height=sz.toFixed(1)+'px'; p.style.background=cols[k%cols.length];
    const dur=1.6+Math.random()*1.5; p.style.animationDuration=dur+'s'; p.style.animationDelay=(Math.random()*0.5).toFixed(2)+'s';
    p.style.setProperty('--rot',(Math.random()*720-360).toFixed(0)+'deg'); p.style.setProperty('--dx',((Math.random()*2-1)*70).toFixed(0)+'px');
    layer.appendChild(p); setTimeout(()=>{ if(p.remove) p.remove(); }, (dur+0.7)*1000); } }catch(e){} }
function inspectSheet(){ if(!ui.inspect) return ''; const o=ui.inspect; return `<div class="isheet-back" data-inspect-close="1"></div><div class="isheet"><div class="ish-h"><span class="ish-ic">${o.icon||''}</span><b>${o.title}</b><button class="ish-x" data-inspect-close="1">✕</button></div><div class="ish-body">${o.html}</div></div>`; }
function openInspect(key){ const parts=String(key).split(':'); const kind=parts[0];
  if(kind==='relic'){ const r=relicById(parts[1]); if(r) ui.inspect={icon:`<span class="coin">${r.ic}</span>`,title:r.nom,html:`<p>${r.desc}</p>`}; }
  else if(kind==='perk'){ const p=(PERKS[parts[1]]||[]).find(x=>x.id===parts[2]); if(p) ui.inspect={icon:'★',title:p.nom,html:`<p>${p.desc}</p><p class="ish-cost">Coût : ${costStr(p.cost)}</p>`}; }
  else if(kind==='mon'){ const m=g&&g.mons&&g.mons[+parts[1]]; if(m){ const t=MONSTERS[m.tmpl]||{};
    ui.inspect={icon:`<span style="color:var(--blood)">⚔</span>`,title:m.nom,html:
      `<div class="isp-row"><div class="isp-port">${bigPortrait('mon',m.tmpl,m.boss)}</div><div><div class="hc-stats"><span>♥ ${Math.max(0,m.pv)}/${m.pvMax}</span><span>⚔ ${m.atk}</span><span>⛨ ${m.def}</span><span>⚡ ${m.vit}</span></div><p class="ish-sub">${m.magic?'Frappe magique · ':''}${m.eliteNom?m.eliteNom+' · ':''}${t.trait||''}</p></div></div>`+
      `<p>${t.desc||''}</p>`+
      `<p class="ish-sub">Intention : <b>${intentText(m)}</b></p>`+
      (m.dot?`<p class="ish-sub">🔥 Poison/brûlure : ${m.dot.dmg}/tour (${m.dot.turns} tours)</p>`:'')+
      (m.vuln>0?`<p class="ish-sub">⤓ Vulnérable — +30% de dégâts subis</p>`:'')+
      (t.loot?`<p class="ish-cost">Butin : ${t.loot.map(x=>MAT_LABEL[x]).join(', ')}</p>`:'') }; } }
  else if(kind==='hero'){ const h=g&&g.team&&g.team[+parts[1]]; if(h){ const c=CLASSES[h.cls]; const st=heroStats(h); const arr=PERKS[h.cls]||[]; const owned=(h.perks||[]).map(id=>{const p=arr.find(x=>x.id===id);return p?p.nom:null;}).filter(Boolean);
    ui.inspect={icon:'★',title:h.nom,html:
      `<div class="isp-row"><div class="isp-port">${bigPortrait('hero',h.cls)}</div><div><p class="ish-sub">${c.role} · niv.${h.lvl}${h.pv<=0?' · à terre':''}</p><div class="hc-stats"><span>♥ ${Math.max(0,h.pv)}/${st.pvMax}</span><span>⚔ ${st.atk}</span><span>⛨ ${st.def}</span><span>⚡ ${st.vit}</span></div></div></div>`+
      `<p><b>${c.passive.nom}</b> — ${c.passive.desc}</p>`+
      `<p class="ish-sub">Équipement : ${['arme','armure','talisman'].map(sl=>h.gear[sl]?gearName(h.gear[sl]):'—').join(' · ')}</p>`+
      ((h.shield>0||h.guard>0||h.poison)?`<p class="ish-sub">${h.shield>0?'⛉ '+h.shield+' bouclier  ':''}${h.guard>0?'⛊ en garde  ':''}${h.poison?'☠ empoisonné':''}</p>`:'')+
      (owned.length?`<p class="ish-sub">Spécialisations : ${owned.join(', ')}</p>`:'') }; } }
  render(); }
let _toastT;
function toast(msg){ const t=$('toast'); if(!t) return; t.textContent=msg; t.classList.add('show'); clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('show'),2000); }

/* keyboard for combat */
document.addEventListener('keydown',e=>{
  if(ui.screen!=='combat') return;
  if(e.key==='1') heroAction('attaque');
  else if(e.key==='2') heroAction('skillA');
  else if(e.key==='3') heroAction('skillB');
  else if(e.key==='4') heroAction('potion');
  else if(e.key==='5') heroAction('defense');
  else if(e.key==='6') heroAction('fureur');
});

/* boot */
render();
</script>
